name: Agent Review

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: agent-review-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    name: Agent PR review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run agent review
        env:
          AGENT_REVIEW_PROVIDER: ${{ vars.AGENT_REVIEW_PROVIDER || 'anthropic' }}
          AGENT_REVIEW_BASE_URL: ${{ vars.AGENT_REVIEW_BASE_URL }}
          AGENT_REVIEW_MODEL: ${{ vars.AGENT_REVIEW_MODEL }}
          AGENT_REVIEW_API_KEY: ${{ secrets.AGENT_REVIEW_API_KEY || secrets.ANTHROPIC_API_KEY || secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: node tools/harness/agent-review.mjs
