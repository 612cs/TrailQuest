spring.application.name=hiking-backend
spring.config.import=optional:classpath:application-local.properties
spring.datasource.url=jdbc:mysql://localhost:3306/hikingDB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

springdoc.swagger-ui.path=/swagger-ui.html

security.jwt.secret=trailquest-dev-secret-key-change-me-please-2026
security.jwt.expiration-hours=72

# OSS 默认从环境变量读取；本地开发可通过 application-local.properties 覆盖
storage.oss.region=${OSS_REGION:cn-shenzhen}
storage.oss.bucket-name=${OSS_BUCKET_NAME:trailquest-prod-media}
storage.oss.endpoint=${OSS_ENDPOINT:oss-cn-shenzhen.aliyuncs.com}
storage.oss.public-url-base=${OSS_PUBLIC_URL_BASE:https://trailquest-prod-media.oss-cn-shenzhen.aliyuncs.com}
storage.oss.access-key-id=${OSS_ACCESS_KEY_ID:}
storage.oss.access-key-secret=${OSS_ACCESS_KEY_SECRET:}
storage.oss.role-arn=${OSS_ROLE_ARN:acs:ram::1304397167722787:role/oss-upload-role}
storage.oss.role-session-name=${OSS_ROLE_SESSION_NAME:trailquest-upload}
storage.oss.sts-duration-seconds=${OSS_STS_DURATION_SECONDS:900}

geo.qweather.base-url=${QWEATHER_GEO_BASE_URL:https://geoapi.qweather.com}
geo.qweather.project-id=${QWEATHER_PROJECT_ID:}
geo.qweather.key-id=${QWEATHER_KEY_ID:}
geo.qweather.private-key=${QWEATHER_PRIVATE_KEY:}
geo.qweather.jwt-ttl-seconds=${QWEATHER_JWT_TTL_SECONDS:900}

ai.dashscope.api-key=${DASHSCOPE_API_KEY:}
ai.dashscope.base-url=${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
ai.dashscope.model=${DASHSCOPE_MODEL:qwen3.5-plus}
ai.dashscope.fast-model=${DASHSCOPE_FAST_MODEL:${DASHSCOPE_MODEL:qwen3.5-plus}}
ai.dashscope.reasoning-model=${DASHSCOPE_REASONING_MODEL:${DASHSCOPE_MODEL:qwen3.5-plus}}
ai.dashscope.connect-timeout-ms=${DASHSCOPE_CONNECT_TIMEOUT_MS:10000}
ai.dashscope.read-timeout-ms=${DASHSCOPE_READ_TIMEOUT_MS:120000}

trail.geo.backfill.enabled=${TRAIL_GEO_BACKFILL_ENABLED:false}

trail.external-import.enabled=${TRAIL_EXTERNAL_IMPORT_ENABLED:true}
trail.external-import.max-candidates=${TRAIL_EXTERNAL_IMPORT_MAX_CANDIDATES:3}
trail.external-import.fallback-author-id=${TRAIL_EXTERNAL_IMPORT_FALLBACK_AUTHOR_ID:1}
trail.external-import.default-provider=${TRAIL_EXTERNAL_IMPORT_DEFAULT_PROVIDER:stub}

trail.external-import.providers.stub.enabled=${TRAIL_EXTERNAL_IMPORT_STUB_ENABLED:true}
trail.external-import.providers.stub.whitelist-sites[0]=${TRAIL_EXTERNAL_IMPORT_STUB_WHITELIST_SITE_0:demo.partner.trailquest.cn}
trail.external-import.providers.stub.whitelist-sites[1]=${TRAIL_EXTERNAL_IMPORT_STUB_WHITELIST_SITE_1:whitelist.trailquest.cn}

trail.external-import.providers.firecrawl.enabled=${TRAIL_EXTERNAL_IMPORT_FIRECRAWL_ENABLED:false}
trail.external-import.providers.firecrawl.api-key=${FIRECRAWL_API_KEY:}
trail.external-import.providers.firecrawl.base-url=${FIRECRAWL_BASE_URL:https://api.firecrawl.dev/v2}
trail.external-import.providers.firecrawl.timeout-ms=${FIRECRAWL_TIMEOUT_MS:10000}
trail.external-import.providers.firecrawl.whitelist-sites[0]=${TRAIL_EXTERNAL_IMPORT_FIRECRAWL_WHITELIST_SITE_0:}
trail.external-import.providers.firecrawl.whitelist-sites[1]=${TRAIL_EXTERNAL_IMPORT_FIRECRAWL_WHITELIST_SITE_1:}
