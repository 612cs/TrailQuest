<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 翡翠绿底色，带圆角适配现代浏览器和苹果设备 -->
  <rect width="512" height="512" rx="115" fill="#10B981"/>

  <!-- 琥珀色太阳 -->
  <circle cx="256" cy="220" r="100" fill="#F59E0B"/>

  <!-- 右侧后方的翠绿山峰 (向阳面和背阴面) -->
  <path d="M380 240 L256 420 L380 420 Z" fill="#6EE7B7"/>
  <path d="M380 240 L380 420 L504 420 Z" fill="#34D399"/>

  <!-- 左侧前方的纯白雪山 (向阳面和背阴面) -->
  <path d="M220 150 L50 420 L220 420 Z" fill="#FFFFFF"/>
  <path d="M220 150 L220 420 L390 420 Z" fill="#F1F5F9"/>
</svg>
