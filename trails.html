<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡通风格 GPX/KML 轨迹渲染 - 沉浸海岛版</title>
    <style>
        :root {
            --primary: #ff9cee;
            --secondary: #b28dff;
            --bg: #82c8fa;
            /* 匹配海洋背景色 */
            --text: #5a5a5a;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Comic Sans MS', 'Nunito', 'Microsoft YaHei', sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* 可爱的悬浮UI面板 */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1),
                inset 0 0 0 4px rgba(255, 255, 255, 0.5);
            text-align: center;
            z-index: 10;
            border: 2px solid #fff;
            transition: all 0.3s ease;
        }

        #ui-panel h1 {
            margin: 0 0 15px 0;
            color: var(--secondary);
            font-size: 24px;
            text-shadow: 1px 1px 0px #fff;
        }

        .upload-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(178, 141, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(178, 141, 255, 0.6);
        }

        .upload-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(178, 141, 255, 0.4);
        }

        /* 提示框 Tooltip */
        #tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid var(--secondary);
            border-radius: 15px;
            padding: 10px 15px;
            color: var(--text);
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 20;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translate(-50%, -100%);
            line-height: 1.5;
        }

        /* 左下角实时镜头参数面板 */
        #camera-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1), inset 0 0 0 2px rgba(255, 255, 255, 0.5);
            font-size: 13px;
            color: var(--text);
            z-index: 10;
        }

        #camera-panel div {
            margin-bottom: 8px;
            font-weight: bold;
            font-family: monospace;
        }

        #copy-cam-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: background 0.2s;
        }

        #copy-cam-btn:hover {
            background: var(--secondary);
        }

        #file-input {
            display: none;
        }

        #status-text {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text);
            font-weight: bold;
        }

        /* 右下角俯瞰全景按钮 */
        #overview-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: none;
            z-index: 10;
        }

        /* 装饰元素 */
        .decoration {
            position: absolute;
            font-size: 24px;
            animation: float 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>

    <!-- 导入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>

    <div class="decoration" style="top: 20px; left: 20px; animation-delay: 0s;">☁️</div>
    <div class="decoration" style="top: 80px; right: 40px; animation-delay: 1s;">🦅</div>
    <div class="decoration" style="bottom: 40px; left: 50px; animation-delay: 0.5s;">🌲</div>

    <div id="ui-panel">
        <h1>⛰️ 奇妙轨迹探险 ⛰️</h1>
        <button class="upload-btn" onclick="document.getElementById('file-input').click()">
            🏕️ 上传 GPX / KML
        </button>
        <input type="file" id="file-input" accept=".gpx,.kml">
        <div id="status-text">等待地图生成...</div>
    </div>

    <!-- 镜头控制台面板 -->
    <div id="camera-panel">
        <div id="cam-pos">📷 位置: 0.00, 0.00, 0.00</div>
        <div id="cam-target">🎯 目标: 0.00, 0.00, 0.00</div>
        <button id="copy-cam-btn">📋 复制镜头参数</button>
    </div>

    <!-- 俯瞰全景按钮 -->
    <button id="overview-btn" class="upload-btn">🚁 俯瞰全景</button>

    <div id="tooltip"></div>

    <div id="canvas-container"></div>

    <script type="module">

        let obj = {
            name: 'cs'
        }

        function changeName(obj) {
            obj = {

            }
        }

        changeName(obj)
        console.log(obj)

        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. 初始化场景、相机和渲染器 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#82c8fa'); // 蓝天海洋色
        scene.fog = new THREE.FogExp2('#82c8fa', 0.008); // 远景自然融入海洋和天空

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 45);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.02; // 防止摄像机完全掉入海里

        // --- 2. 灯光设置 ---
        const ambientLight = new THREE.AmbientLight('#ffffff', 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight('#ffffff', 1.2);
        dirLight.position.set(30, 60, 40);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 200;
        const d = 40;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- 3. 全局变量 ---
        let currentSceneGroup = new THREE.Group();
        let skyGroup = new THREE.Group();
        scene.add(currentSceneGroup);
        scene.add(skyGroup);

        let mainPathCurve = null;
        let travelerData = null;
        let animationTime = 0;
        let globalTotalDistance = 0;
        let globalMinEle = 0;
        let globalEleRange = 1;
        let globalTerrainRefPoints = []; // 保存地形参考点，用于相机的实时防穿模检测

        // 交互与状态变量
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-100, -100);
        let pointerClientX = 0;
        let pointerClientY = 0;
        let milestoneHitBoxes = [];
        let currentIntersected = null;
        let popups = []; // 用于存储庆祝云气泡
        let nextPopupKm = 1; // 下一个要弹出的公里数
        const tooltip = document.getElementById('tooltip');

        // 镜头丝滑平滑专用变量
        const rotationDummy = new THREE.Object3D(); // 用于计算平滑转身的虚拟替身

        window.addEventListener('pointermove', (e) => {
            pointerClientX = e.clientX;
            pointerClientY = e.clientY;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                pointerClientX = e.touches[0].clientX;
                pointerClientY = e.touches[0].clientY;
                mouse.x = (pointerClientX / window.innerWidth) * 2 - 1;
                mouse.y = -(pointerClientY / window.innerHeight) * 2 + 1;
            }
        }, { passive: true });

        // --- 镜头复制按钮逻辑 ---
        document.getElementById('copy-cam-btn').addEventListener('click', () => {
            const cam = camera.position;
            const tgt = controls.target;
            const textToCopy = `camera.position.set(${cam.x.toFixed(2)}, ${cam.y.toFixed(2)}, ${cam.z.toFixed(2)});\ncontrols.target.set(${tgt.x.toFixed(2)}, ${tgt.y.toFixed(2)}, ${tgt.z.toFixed(2)});`;

            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                const btn = document.getElementById('copy-cam-btn');
                btn.innerText = '✅ 复制成功，发给AI吧！';
                setTimeout(() => btn.innerText = '📋 复制镜头参数', 3000);
            } catch (err) {
                console.error('Copy failed', err);
            }
            document.body.removeChild(textArea);
        });

        // --- 俯瞰镜头按钮逻辑 ---
        document.getElementById('overview-btn').addEventListener('click', () => {
            // 提取用户给出的相对高度特征：高度在 55 左右，目标点高度在 4 左右。
            // 因为我们的地图缩放中心永远固定在 (x:0, z:0)，所以完美复刻该视角的通用坐标如下：
            // Z轴微小的 0.1 偏移是为了防止 Three.js 在完全垂直时发生 Gimbal Lock（万向节死锁导致画面翻转）
            camera.position.set(0, 56, 0.1);
            controls.target.set(0, 4, 0);
            controls.update();
        });

        // --- 地理计算工具 ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                Math.cos(φ1) * Math.cos(φ2) *
                Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // --- 4. 生成可爱的 3D 资产 ---

        // 太阳与天空云朵生成
        function buildEnvironment(mapSize) {
            skyGroup.clear();

            // 无边无际的海洋
            const oceanGeo = new THREE.PlaneGeometry(mapSize * 20, mapSize * 20);
            const oceanMat = new THREE.MeshToonMaterial({ color: '#5dade2', transparent: true, opacity: 0.8 });
            const ocean = new THREE.Mesh(oceanGeo, oceanMat);
            ocean.rotation.x = -Math.PI / 2;
            ocean.position.y = -3.5; // 水面位置
            skyGroup.add(ocean);

            // 卡通太阳
            const sunMat = new THREE.MeshBasicMaterial({ color: '#ffea00' });
            const sun = new THREE.Mesh(new THREE.SphereGeometry(15, 32, 32), sunMat);
            sun.position.set(80, 100, -100);
            skyGroup.add(sun);

            // 天空浮云
            const cloudMat = new THREE.MeshToonMaterial({ color: '#ffffff', flatShading: true });
            for (let i = 0; i < 15; i++) {
                const cloud = new THREE.Group();
                const numPuffs = 3 + Math.random() * 3;
                for (let j = 0; j < numPuffs; j++) {
                    const puff = new THREE.Mesh(new THREE.SphereGeometry(2 + Math.random() * 2, 8, 8), cloudMat);
                    puff.position.set(
                        (Math.random() - 0.5) * 4,
                        (Math.random() - 0.5) * 2,
                        (Math.random() - 0.5) * 4
                    );
                    cloud.add(puff);
                }
                const radius = 50 + Math.random() * 50;
                const angle = Math.random() * Math.PI * 2;
                cloud.position.set(
                    Math.cos(angle) * radius,
                    20 + Math.random() * 30, // 云层高度
                    Math.sin(angle) * radius
                );
                // 存储角度以备动画使用
                cloud.userData = { angle: angle, radius: radius, speed: 0.05 + Math.random() * 0.1 };
                skyGroup.add(cloud);
            }
        }

        // 庆祝气泡生成器
        function showCloudPopup(km, ele, remain, position3D) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 250;
            const ctx = canvas.getContext('2d');

            ctx.textAlign = 'center';
            // 画可爱的卡通云朵背景
            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.beginPath();
            ctx.arc(100, 120, 60, Math.PI * 0.5, Math.PI * 1.5);
            ctx.arc(170, 80, 70, Math.PI * 1, Math.PI * 2);
            ctx.arc(260, 90, 60, Math.PI * 1, Math.PI * 2);
            ctx.arc(320, 130, 50, Math.PI * 1.5, Math.PI * 0.5);
            ctx.moveTo(100, 180); ctx.lineTo(320, 180);
            ctx.fill();

            // 绘制文字
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 36px "Comic Sans MS", sans-serif';
            ctx.fillText(`🎉 达到 ${km} 公里 !`, 200, 95);

            ctx.fillStyle = '#5a5a5a';
            ctx.font = 'bold 30px "Comic Sans MS", sans-serif';
            ctx.fillText(`🏔️ 海拔: ${Math.round(ele)} m`, 200, 140);

            ctx.fillStyle = '#4ecdc4';
            ctx.fillText(`🎯 剩余: ${remain.toFixed(1)} km`, 200, 180);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 1 });
            const sprite = new THREE.Sprite(material);

            // 将气泡稍微偏上一点，避免挡住小人
            sprite.position.copy(position3D).add(new THREE.Vector3(0, 3, 0));
            sprite.scale.set(3, 1.875, 1);
            currentSceneGroup.add(sprite);

            // 加入动画队列
            popups.push({ sprite: sprite, age: 0 });
        }

        function createCuteCharacter() {
            const charGroup = new THREE.Group();
            const matSkin = new THREE.MeshToonMaterial({ color: '#ffcc99' });
            const matShirt = new THREE.MeshToonMaterial({ color: '#ff6b6b' });
            const matPants = new THREE.MeshToonMaterial({ color: '#4ecdc4' });

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), matSkin);
            head.position.y = 0.6; head.castShadow = true; charGroup.add(head);
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.3, 0.15), matShirt);
            body.position.y = 0.3; body.castShadow = true; charGroup.add(body);

            const createLimb = (mat, w, h, d, yOffset) => {
                const limb = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                limb.position.y = yOffset; limb.castShadow = true;
                const pivot = new THREE.Group(); pivot.add(limb);
                return pivot;
            };

            const legL = createLimb(matPants, 0.1, 0.2, 0.1, -0.1); legL.position.set(-0.08, 0.15, 0); charGroup.add(legL);
            const legR = createLimb(matPants, 0.1, 0.2, 0.1, -0.1); legR.position.set(0.08, 0.15, 0); charGroup.add(legR);
            const armL = createLimb(matSkin, 0.08, 0.25, 0.08, -0.1); armL.position.set(-0.18, 0.4, 0); charGroup.add(armL);
            const armR = createLimb(matSkin, 0.08, 0.25, 0.08, -0.1); armR.position.set(0.18, 0.4, 0); charGroup.add(armR);

            return { group: charGroup, legL, legR, armL, armR };
        }

        function createMilestonePoster(distanceMeters, elevation, isHighest = false, index = 0) {
            const group = new THREE.Group();
            const postHeight = isHighest ? 1.0 : 0.6;
            const postColor = isHighest ? '#ffd700' : '#8b5a2b';
            const post = new THREE.Mesh(
                new THREE.CylinderGeometry(0.03, 0.03, postHeight, 8),
                new THREE.MeshToonMaterial({ color: postColor })
            );
            post.position.y = postHeight / 2; post.castShadow = true; group.add(post);

            const canvas = document.createElement('canvas');
            canvas.width = isHighest ? 450 : 400; canvas.height = 200;
            const ctx = canvas.getContext('2d');
            const r = 20;
            ctx.fillStyle = isHighest ? 'rgba(255, 223, 0, 0.95)' : 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.moveTo(r, 0); ctx.lineTo(canvas.width - r, 0); ctx.quadraticCurveTo(canvas.width, 0, canvas.width, r);
            ctx.lineTo(canvas.width, 200 - r); ctx.quadraticCurveTo(canvas.width, 200, canvas.width - r, 200);
            ctx.lineTo(r, 200); ctx.quadraticCurveTo(0, 200, 0, 200 - r); ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
            ctx.closePath(); ctx.fill();
            ctx.lineWidth = 12; ctx.strokeStyle = isHighest ? '#ff3333' : '#b28dff'; ctx.stroke();

            ctx.textAlign = 'center';
            if (isHighest) {
                ctx.fillStyle = '#d32f2f'; ctx.font = 'bold 55px "Comic Sans MS", sans-serif';
                ctx.fillText(`👑 最高点`, canvas.width / 2, 85);
                ctx.fillStyle = '#c2185b'; ctx.font = 'bold 45px "Comic Sans MS", sans-serif';
                ctx.fillText(`🏔️ ${Math.round(elevation)} m`, canvas.width / 2, 155);
            } else {
                let titleText = index === 0 ? "🚩 起 点" : `🚩 第 ${index} 公里`;
                ctx.fillStyle = '#5a5a5a'; ctx.font = 'bold 55px "Comic Sans MS", sans-serif';
                ctx.fillText(titleText, canvas.width / 2, 85);
                ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 45px "Comic Sans MS", sans-serif';
                ctx.fillText(`🏔️ ${Math.round(elevation)} m`, canvas.width / 2, 155);
            }

            const texture = new THREE.CanvasTexture(canvas); texture.minFilter = THREE.LinearFilter;
            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            sprite.position.y = isHighest ? 1.2 : 0.8; sprite.scale.set(isHighest ? 1.0 : 0.8, isHighest ? 0.44 : 0.4, 1);
            group.add(sprite);

            const hitMesh = new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 8), new THREE.MeshBasicMaterial({ visible: false }));
            hitMesh.position.y = isHighest ? 0.8 : 0.6;
            // 记录数据以供 Tooltip 交互使用
            hitMesh.userData = { isMilestone: true, distance: distanceMeters, elevation: elevation, isHighest: isHighest };
            group.add(hitMesh);
            return { group, hitMesh };
        }

        // --- 5. 文件解析部分 ---
        document.getElementById('file-input').addEventListener('change', handleFileUpload);

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            document.getElementById('status-text').innerText = '正在施展魔法解析文件... 🪄';

            const reader = new FileReader();
            reader.onload = function (e) {
                setTimeout(() => {
                    const parsedData = (ext === 'kml') ? parseKML(e.target.result) : parseGPX(e.target.result);
                    if (parsedData.paths.length === 0) {
                        alert("抱歉！未找到轨迹。");
                        document.getElementById('status-text').innerText = '魔法失效了 🥺';
                        return;
                    }
                    build3DWorld(parsedData, file.name);
                }, 50);
            };
            reader.readAsText(file);
        }

        function getElementsByLocalName(parent, name) { return Array.from(parent.getElementsByTagName('*')).filter(el => el.localName === name); }
        function parseKmlColor(kmlColor) {
            if (!kmlColor || kmlColor.length !== 8) return '#ff3366';
            return `#${kmlColor.substring(6, 8)}${kmlColor.substring(4, 6)}${kmlColor.substring(2, 4)}`;
        }

        function parseKML(xmlText) {
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
            const data = { paths: [], waypoints: [] };
            const styles = {};
            getElementsByLocalName(xmlDoc, 'Style').forEach(style => {
                const colorNode = getElementsByLocalName(style, 'color')[0];
                if (style.getAttribute('id') && colorNode) styles['#' + style.getAttribute('id')] = parseKmlColor(colorNode.textContent.trim());
            });

            getElementsByLocalName(xmlDoc, 'Placemark').forEach(pm => {
                const nameNode = getElementsByLocalName(pm, 'name')[0];
                let color = styles[getElementsByLocalName(pm, 'styleUrl')[0]?.textContent || ''] || '#ff3366';
                const inlineColor = getElementsByLocalName(pm, 'color')[0];
                if (inlineColor && inlineColor.parentNode.localName === 'LineStyle') color = parseKmlColor(inlineColor.textContent.trim());

                ['LineString', 'Track'].forEach(tagName => {
                    getElementsByLocalName(pm, tagName).forEach(el => {
                        const points = [];
                        (tagName === 'LineString' ? [getElementsByLocalName(el, 'coordinates')[0]?.textContent] : getElementsByLocalName(el, 'coord').map(c => c.textContent)).forEach(text => {
                            if (!text) return;
                            text.trim().split(tagName === 'LineString' ? /\s+/ : undefined).forEach(coord => {
                                const parts = coord.split(tagName === 'LineString' ? ',' : /\s+/).map(Number);
                                if (parts.length >= 2 && !isNaN(parts[0])) points.push({ lon: parts[0], lat: parts[1], ele: parts[2] || 0 });
                            });
                        });
                        if (points.length > 0) data.paths.push({ name: nameNode?.textContent || '路线', color, points });
                    });
                });
            });
            return data;
        }

        function parseGPX(xmlText) {
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
            const data = { paths: [], waypoints: [] };
            ['trk', 'trkpt'].forEach(tag => {
                if (tag === 'trkpt' && data.paths.length > 0) return;
                const parent = tag === 'trk' ? getElementsByLocalName(xmlDoc, 'trk') : [xmlDoc];
                parent.forEach(p => {
                    const points = [];
                    getElementsByLocalName(p, 'trkpt').forEach(pt => points.push({ lat: parseFloat(pt.getAttribute('lat')), lon: parseFloat(pt.getAttribute('lon')), ele: parseFloat(getElementsByLocalName(pt, 'ele')[0]?.textContent || 0) }));
                    if (points.length > 0) data.paths.push({ name: getElementsByLocalName(p, 'name')[0]?.textContent || '轨迹', color: '#ff3366', points });
                });
            });
            return data;
        }

        // --- 6. 构建 3D 世界 ---
        function build3DWorld(parsedData, fileName) {
            controls.enabled = true;

            scene.remove(currentSceneGroup);
            currentSceneGroup = new THREE.Group();
            scene.add(currentSceneGroup);
            mainPathCurve = null; travelerData = null; popups = []; nextPopupKm = 1;

            // 显示俯瞰按钮
            document.getElementById('overview-btn').style.display = 'block';

            let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
            globalMinEle = Infinity;
            let maxEle = -Infinity;

            const allPoints = [];
            parsedData.paths.forEach(path => path.points.forEach(p => allPoints.push(p)));

            allPoints.forEach(p => {
                minLat = Math.min(minLat, p.lat); maxLat = Math.max(maxLat, p.lat);
                minLon = Math.min(minLon, p.lon); maxLon = Math.max(maxLon, p.lon);
                globalMinEle = Math.min(globalMinEle, p.ele); maxEle = Math.max(maxEle, p.ele);
            });

            const mapSize = 50;
            globalEleRange = maxEle - globalMinEle || 1;
            const scale = mapSize / Math.max(maxLat - minLat || 1, maxLon - minLon || 1);
            const centerLat = (minLat + maxLat) / 2; const centerLon = (minLon + maxLon) / 2;

            const toLocal3D = (p) => new THREE.Vector3((p.lon - centerLon) * scale, ((p.ele - globalMinEle) / globalEleRange) * 12 + 0.5, -(p.lat - centerLat) * scale);
            const flat3DPoints = allPoints.map(toLocal3D);

            // 限制视角
            controls.maxDistance = mapSize * 2.2;

            // 生成环境与岛屿
            buildEnvironment(mapSize);
            const step = Math.ceil(flat3DPoints.length / 800);
            const terrainRefPoints = flat3DPoints.filter((_, i) => i % step === 0);

            globalTerrainRefPoints = terrainRefPoints; // 赋值给全局变量，供相机碰撞使用

            if (terrainRefPoints.length > 0) {
                generateTerrain(terrainRefPoints, mapSize);
                generateDecorations(terrainRefPoints, mapSize);
            }

            milestoneHitBoxes = [];
            let longestPathData = null;

            parsedData.paths.forEach(path => {
                const vecPoints = (path.points.length > 2000 ? path.points.filter((_, i) => i % Math.ceil(path.points.length / 1000) === 0) : path.points).map(toLocal3D);
                if (vecPoints.length < 2) return;
                const curve = new THREE.CatmullRomCurve3(vecPoints);
                const tube = new THREE.Mesh(new THREE.TubeGeometry(curve, vecPoints.length * 2, 0.08, 6, false), new THREE.MeshToonMaterial({ color: path.color, emissive: path.color, emissiveIntensity: 0.1 }));
                tube.castShadow = true; tube.position.y += 0.05;
                currentSceneGroup.add(tube);
                if (!longestPathData || path.points.length > longestPathData.points.length) { longestPathData = path; mainPathCurve = curve; }
            });

            if (longestPathData) {
                const pts = longestPathData.points;
                let highestPoint = pts[0];
                globalTotalDistance = 0;

                const startPoster = createMilestonePoster(0, pts[0].ele, false, 0);
                startPoster.group.position.copy(toLocal3D(pts[0])); currentSceneGroup.add(startPoster.group);
                milestoneHitBoxes.push(startPoster.hitMesh);

                let accumulatedDistance = 0, nextMarkerAt = 1000, milestoneIndex = 1;

                for (let i = 1; i < pts.length; i++) {
                    if (pts[i].ele > highestPoint.ele) highestPoint = pts[i];
                    const dist = calculateDistance(pts[i - 1].lat, pts[i - 1].lon, pts[i].lat, pts[i].lon);
                    accumulatedDistance += dist;
                    globalTotalDistance += dist;

                    if (accumulatedDistance >= nextMarkerAt) {
                        const poster = createMilestonePoster(nextMarkerAt, pts[i].ele, false, milestoneIndex);
                        poster.group.position.copy(toLocal3D(pts[i])).add(new THREE.Vector3(0, 0.1, 0));
                        currentSceneGroup.add(poster.group);
                        milestoneHitBoxes.push(poster.hitMesh);
                        nextMarkerAt += 1000; milestoneIndex++;
                    }
                }

                const highestPoster = createMilestonePoster(0, highestPoint.ele, true);
                highestPoster.group.position.copy(toLocal3D(highestPoint)).add(new THREE.Vector3(0, 0.2, 0));
                currentSceneGroup.add(highestPoster.group);
                milestoneHitBoxes.push(highestPoster.hitMesh);

                travelerData = createCuteCharacter();
                currentSceneGroup.add(travelerData.group);
            }

            controls.target.set(0, 4, 0); camera.position.set(0, 30, 45); animationTime = 0;
            document.getElementById('status-text').innerText = `✨ 欢迎来到 ${fileName} 岛屿！全长 ${(globalTotalDistance / 1000).toFixed(2)} km ✨`;
        }

        // --- 7. 山体生成 ---
        function getTerrainHeight(vx, vz, terrainRefPoints) {
            let num = 0, den = 0, minDist = Infinity;
            for (let p of terrainRefPoints) {
                const d2 = (vx - p.x) ** 2 + (vz - p.z) ** 2;
                minDist = Math.min(minDist, d2);
                const weight = 1.0 / (Math.pow(d2, 1.2) + 0.1);
                num += p.y * weight; den += weight;
            }
            const distToTrack = Math.sqrt(minDist);
            let finalY = (num / den) - (distToTrack * 0.3 + Math.pow(distToTrack / 6, 2.5)) - 0.15;
            if (distToTrack > 15) finalY -= (distToTrack - 15) * 5;
            return { y: finalY, distToTrack };
        }

        function generateTerrain(terrainRefPoints, mapSize) {
            const segments = 120;
            const terrainGeo = new THREE.PlaneGeometry(mapSize * 2.5, mapSize * 2.5, segments, segments);
            terrainGeo.rotateX(-Math.PI / 2);

            const posAttr = terrainGeo.attributes.position;
            const colorAttr = new THREE.BufferAttribute(new Float32Array(posAttr.count * 3), 3);
            terrainGeo.setAttribute('color', colorAttr);

            const colorGrass = new THREE.Color('#88d4ab'), colorRock = new THREE.Color('#d1c7b7'), colorSnow = new THREE.Color('#ffffff'), colorOcean = new THREE.Color('#5dade2');

            for (let i = 0; i < posAttr.count; i++) {
                const vx = posAttr.getX(i), vz = posAttr.getZ(i);
                const { y } = getTerrainHeight(vx, vz, terrainRefPoints);
                posAttr.setY(i, y);

                let c = new THREE.Color();
                if (y < -3) {
                    c.lerpColors(colorRock, colorOcean, Math.min(1, (-y - 3) / 10));
                } else if (y < 2) {
                    const noise = (Math.sin(vx * 5) + Math.cos(vz * 5)) * 0.03;
                    c.copy(colorGrass); c.r += noise; c.g += noise; c.b += noise;
                } else if (y < 8) c.lerpColors(colorGrass, colorRock, (y - 2) / 6);
                else c.lerpColors(colorRock, colorSnow, Math.min(1, (y - 8) / 4));
                colorAttr.setXYZ(i, c.r, c.g, c.b);
            }
            terrainGeo.computeVertexNormals();
            const terrain = new THREE.Mesh(terrainGeo, new THREE.MeshToonMaterial({ vertexColors: true, flatShading: true }));
            terrain.receiveShadow = true; currentSceneGroup.add(terrain);
        }

        function generateDecorations(terrainRefPoints, mapSize) {
            const treeLeafMat = new THREE.MeshToonMaterial({ color: '#5eb376', flatShading: true });
            const treeTrunkMat = new THREE.MeshToonMaterial({ color: '#8b5a2b' });
            const rockMat = new THREE.MeshToonMaterial({ color: '#b0bec5', flatShading: true });
            const leafGeo = new THREE.IcosahedronGeometry(0.3, 0), trunkGeo = new THREE.CylinderGeometry(0.06, 0.1, 0.4, 6), rockGeo = new THREE.DodecahedronGeometry(0.25, 0);

            for (let i = 0; i < 450; i++) {
                const vx = (Math.random() - 0.5) * 2 * mapSize, vz = (Math.random() - 0.5) * 2 * mapSize;
                const { y, distToTrack } = getTerrainHeight(vx, vz, terrainRefPoints);

                if (distToTrack > 1.2 && distToTrack < 12 && y > -1 && y < 8) {
                    const obj = new THREE.Group(), rand = Math.random();
                    if (rand > 0.5) {
                        const trunk = new THREE.Mesh(trunkGeo, treeTrunkMat); trunk.position.y = 0.2; trunk.castShadow = true;
                        const leaf = new THREE.Mesh(leafGeo, treeLeafMat); leaf.position.y = 0.5; leaf.scale.set(1 + Math.random() * 0.5, 1 + Math.random() * 0.5, 1 + Math.random() * 0.5); leaf.rotation.set(Math.random(), Math.random(), Math.random()); leaf.castShadow = true;
                        obj.add(trunk, leaf);
                    } else if (rand > 0.2) {
                        const rock = new THREE.Mesh(rockGeo, rockMat); rock.position.y = 0.1; rock.scale.set(1 + Math.random(), 0.5 + Math.random() * 0.5, 1 + Math.random()); rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0); rock.castShadow = true; obj.add(rock);
                    } else {
                        const bush = new THREE.Mesh(rockGeo, treeLeafMat); bush.position.y = 0.05; bush.scale.set(1.5, 0.6, 1.5); bush.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0); bush.castShadow = true; obj.add(bush);
                    }
                    obj.position.set(vx, y, vz); const scale = 0.5 + Math.random() * 0.7; obj.scale.set(scale, scale, scale);
                    currentSceneGroup.add(obj);
                }
            }
        }

        // --- 8. 动画与渲染循环 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 实时更新控制台 UI 的镜头数据
            document.getElementById('cam-pos').innerText = `📷 位置: ${camera.position.x.toFixed(2)}, ${camera.position.y.toFixed(2)}, ${camera.position.z.toFixed(2)}`;
            document.getElementById('cam-target').innerText = `🎯 目标: ${controls.target.x.toFixed(2)}, ${controls.target.y.toFixed(2)}, ${controls.target.z.toFixed(2)}`;

            // 旋转天空背景里的云
            skyGroup.children.forEach(child => {
                if (child.userData && child.userData.angle !== undefined) {
                    child.userData.angle += delta * child.userData.speed;
                    child.position.x = Math.cos(child.userData.angle) * child.userData.radius;
                    child.position.z = Math.sin(child.userData.angle) * child.userData.radius;
                }
            });

            // 小人行走
            if (mainPathCurve && travelerData) {
                animationTime += delta * 0.01;
                if (animationTime > 1) {
                    animationTime = 0;
                    nextPopupKm = 1; // 跑完一圈重置气泡公里数
                }

                const pos = mainPathCurve.getPointAt(animationTime);
                travelerData.group.position.copy(pos);

                const nextTime = Math.min(1, animationTime + 0.01);
                const nextPos = mainPathCurve.getPointAt(nextTime);

                // 【平滑转身优化】为了防止绑在背上的相机抖动，这里使用 Slerp 球面插值让小人温柔地转身
                rotationDummy.position.copy(pos);
                rotationDummy.lookAt(new THREE.Vector3(nextPos.x, pos.y, nextPos.z));
                travelerData.group.quaternion.slerp(rotationDummy.quaternion, 0.1);

                const swing = Math.sin(animationTime * 60);
                travelerData.legL.rotation.x = swing * 0.6; travelerData.legR.rotation.x = -swing * 0.6;
                travelerData.armL.rotation.x = -swing * 0.6; travelerData.armR.rotation.x = swing * 0.6;
                travelerData.group.position.y += Math.abs(Math.sin(animationTime * 60)) * 0.05;

                // 计算当前里程，触发庆祝云朵气泡
                const currentDist = animationTime * globalTotalDistance;
                if (currentDist >= nextPopupKm * 1000) {
                    const remainKm = (globalTotalDistance - currentDist) / 1000;
                    const realEle = ((pos.y - 0.5) / 12) * globalEleRange + globalMinEle;
                    showCloudPopup(nextPopupKm, realEle, remainKm, pos);
                    nextPopupKm++;
                }
            }

            // 更新庆祝气泡动画 (上浮与消散)
            for (let i = popups.length - 1; i >= 0; i--) {
                const p = popups[i];
                p.age += delta;
                p.sprite.position.y += delta * 1.5;

                if (p.age > 2) {
                    p.sprite.material.opacity -= delta * 0.8;
                    if (p.sprite.material.opacity <= 0) {
                        currentSceneGroup.remove(p.sprite);
                        popups.splice(i, 1);
                    }
                }
            }

            // 处理鼠标交互热区和 Tooltip 提示框
            if (milestoneHitBoxes.length > 0) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(milestoneHitBoxes);
                if (intersects.length > 0) {
                    currentIntersected = intersects[0].object;
                    container.style.cursor = 'pointer';

                    const data = currentIntersected.userData;
                    let distText = data.distance >= 1000 ? `${(data.distance / 1000).toFixed(1)} km` : `${data.distance} m`;
                    if (data.isHighest) distText = "最高峰";

                    tooltip.innerHTML = `🚩 里程: ${distText}<br>🏔️ 海拔: ${Math.round(data.elevation)} m`;
                    tooltip.style.opacity = 1;
                    tooltip.style.left = pointerClientX + 'px';
                    tooltip.style.top = (pointerClientY - 20) + 'px';
                } else {
                    currentIntersected = null;
                    container.style.cursor = 'default';
                    tooltip.style.opacity = 0;
                }

                // Q弹缩放
                milestoneHitBoxes.forEach(hitMesh => {
                    const targetScale = (hitMesh === currentIntersected) ? 1.4 : 1.0;
                    hitMesh.parent.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.15);
                });
            }

            if (currentSceneGroup.children.length === 0) scene.rotation.y += delta * 0.2;
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
