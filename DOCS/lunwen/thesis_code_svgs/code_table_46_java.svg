<g font-family="monospace" font-size="14px">
<text x="0" y="14" xml:space="preserve">@Override</text>
<text x="0" y="33" xml:space="preserve"><tspan>public</tspan>&#160;UploadStsVo&#160;createUploadSts(Long&#160;userId,&#160;CreateUploadStsRequest&#160;request)&#160;{</text>
<text x="0" y="52" xml:space="preserve">&#160;&#160;&#160;&#160;MediaBizType&#160;bizType&#160;=&#160;requireBizType(request.getBizType());</text>
<text x="0" y="71" xml:space="preserve">&#160;&#160;&#160;&#160;validateFileForBizType(bizType,&#160;request.getFileName(),&#160;request.getMimeType());</text>
<text x="0" y="90" xml:space="preserve"></text>
<text x="0" y="109" xml:space="preserve">&#160;&#160;&#160;&#160;String&#160;extension&#160;=&#160;extractExtension(request.getFileName());</text>
<text x="0" y="128" xml:space="preserve">&#160;&#160;&#160;&#160;String&#160;objectKey&#160;=&#160;buildObjectKey(bizType,&#160;userId,&#160;extension);</text>
<text x="0" y="147" xml:space="preserve">&#160;&#160;&#160;&#160;cacheIssuedObjectKey(userId,&#160;bizType,&#160;objectKey);</text>
<text x="0" y="166" xml:space="preserve"></text>
<text x="0" y="185" xml:space="preserve">&#160;&#160;&#160;&#160;AssumeRoleResponse.Credentials&#160;credentials&#160;=&#160;assumeRole(objectKey);</text>
<text x="0" y="204" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>return</tspan>&#160;UploadStsVo.builder()</text>
<text x="0" y="223" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.bucket(ossProperties.getBucketName())</text>
<text x="0" y="242" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.objectKey(objectKey)</text>
<text x="0" y="261" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.expireAt(System.currentTimeMillis()&#160;+&#160;ossProperties.getStsDurationSeconds()&#160;*&#160;1000)</text>
<text x="0" y="280" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.build();</text>
<text x="0" y="299" xml:space="preserve">}</text>
<text x="0" y="318" xml:space="preserve"></text></g></svg>
