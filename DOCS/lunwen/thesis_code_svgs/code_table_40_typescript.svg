<?xml version="1.0"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.0//EN" "http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="611" height="303" viewBox="0 0 611 303">
<rect x="0" y="0" width="611" height="303" fill="white"/>
<g font-family="monospace" font-size="14px">
<text x="0" y="14" xml:space="preserve"><tspan>const</tspan>&#160;heroImageUrl&#160;=&#160;ref(<tspan>&#39;&#39;</tspan>)</text>
<text x="0" y="33" xml:space="preserve"><tspan>const</tspan>&#160;heroSaving&#160;=&#160;ref(<tspan>false</tspan>)</text>
<text x="0" y="52" xml:space="preserve"><tspan>const</tspan>&#160;heroUploading&#160;=&#160;ref(<tspan>false</tspan>)</text>
<text x="0" y="71" xml:space="preserve"></text>
<text x="0" y="90" xml:space="preserve"><tspan>async</tspan>&#160;<tspan>function</tspan>&#160;loadHeroSetting()&#160;{</text>
<text x="0" y="109" xml:space="preserve">&#160;&#160;<tspan>const</tspan>&#160;result&#160;=&#160;<tspan>await</tspan>&#160;fetchAdminHomeHeroSetting()</text>
<text x="0" y="128" xml:space="preserve">&#160;&#160;heroImageUrl.value&#160;=&#160;result.imageUrl?.trim()&#160;||&#160;<tspan>&#39;&#39;</tspan></text>
<text x="0" y="147" xml:space="preserve">}</text>
<text x="0" y="166" xml:space="preserve"></text>
<text x="0" y="185" xml:space="preserve"><tspan>async</tspan>&#160;<tspan>function</tspan>&#160;saveHeroSetting()&#160;{</text>
<text x="0" y="204" xml:space="preserve">&#160;&#160;heroSaving.value&#160;=&#160;<tspan>true</tspan></text>
<text x="0" y="223" xml:space="preserve">&#160;&#160;<tspan>await</tspan>&#160;updateAdminHomeHeroSetting({&#160;imageUrl:&#160;heroImageUrl.value.trim()&#160;||&#160;<tspan>undefined</tspan>&#160;})</text>
<text x="0" y="242" xml:space="preserve">&#160;&#160;heroSaving.value&#160;=&#160;<tspan>false</tspan></text>
<text x="0" y="261" xml:space="preserve">}</text>
<text x="0" y="280" xml:space="preserve"></text></g></svg>
