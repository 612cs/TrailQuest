<rect x="0" y="0" width="584" height="428" fill="white"/>
<g font-family="monospace" font-size="14px">
<text x="0" y="14" xml:space="preserve">@Transactional</text>
<text x="0" y="33" xml:space="preserve"><tspan>public</tspan>&#160;void&#160;banUser(Long&#160;userId,&#160;Long&#160;adminUserId,&#160;AdminBanUserRequest&#160;request)&#160;{</text>
<text x="0" y="52" xml:space="preserve">&#160;&#160;&#160;&#160;User&#160;user&#160;=&#160;requireUser(userId);</text>
<text x="0" y="71" xml:space="preserve">&#160;&#160;&#160;&#160;user.setStatus(UserStatus.BANNED.getCode());</text>
<text x="0" y="90" xml:space="preserve">&#160;&#160;&#160;&#160;user.setBanReason(request.getReason());</text>
<text x="0" y="109" xml:space="preserve">&#160;&#160;&#160;&#160;user.setBannedBy(adminUserId);</text>
<text x="0" y="128" xml:space="preserve">&#160;&#160;&#160;&#160;user.setBannedAt(LocalDateTime.now());</text>
<text x="0" y="147" xml:space="preserve">&#160;&#160;&#160;&#160;userMapper.updateById(user);</text>
<text x="0" y="166" xml:space="preserve"></text>
<text x="0" y="185" xml:space="preserve">&#160;&#160;&#160;&#160;adminOperationLogService.record(</text>
<text x="0" y="204" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;adminUserId,</text>
<text x="0" y="223" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>&quot;</tspan><tspan>user_management</tspan><tspan>&quot;</tspan>,</text>
<text x="0" y="242" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>&quot;</tspan><tspan>user_ban</tspan><tspan>&quot;</tspan>,</text>
<text x="0" y="261" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>&quot;</tspan><tspan>user</tspan><tspan>&quot;</tspan>,</text>
<text x="0" y="280" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;userId,</text>
<text x="0" y="299" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;user.getUsername(),</text>
<text x="0" y="318" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;request.getReason(),</text>
<text x="0" y="337" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;snapshot(<tspan>&quot;</tspan><tspan>status</tspan><tspan>&quot;</tspan>,&#160;UserStatus.ACTIVE.getCode()),</text>
<text x="0" y="356" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;snapshot(<tspan>&quot;</tspan><tspan>status</tspan><tspan>&quot;</tspan>,&#160;user.getStatus(),&#160;<tspan>&quot;</tspan><tspan>banReason</tspan><tspan>&quot;</tspan>,&#160;user.getBanReason()));</text>
<text x="0" y="375" xml:space="preserve">}</text>
