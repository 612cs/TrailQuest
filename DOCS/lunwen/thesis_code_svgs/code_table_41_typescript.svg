<?xml version="1.0"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.0//EN" "http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="407" viewBox="0 0 512 407">
<rect x="0" y="0" width="512" height="407" fill="white"/>
<g font-family="monospace" font-size="14px">
<text x="0" y="14" xml:space="preserve"><tspan>const</tspan>&#160;groups&#160;=&#160;ref&lt;AdminOptionGroup[]&gt;([])</text>
<text x="0" y="33" xml:space="preserve"><tspan>const</tspan>&#160;selectedGroupCode&#160;=&#160;ref(<tspan>&#39;&#39;</tspan>)</text>
<text x="0" y="52" xml:space="preserve"><tspan>const</tspan>&#160;drafts&#160;=&#160;ref&lt;ItemDraft[]&gt;([])</text>
<text x="0" y="71" xml:space="preserve"></text>
<text x="0" y="90" xml:space="preserve"><tspan>async</tspan>&#160;<tspan>function</tspan>&#160;loadGroups()&#160;{</text>
<text x="0" y="109" xml:space="preserve">&#160;&#160;<tspan>const</tspan>&#160;result&#160;=&#160;<tspan>await</tspan>&#160;fetchAdminOptionGroups()</text>
<text x="0" y="128" xml:space="preserve">&#160;&#160;groups.value&#160;=&#160;result</text>
<text x="0" y="147" xml:space="preserve">&#160;&#160;<tspan>if</tspan>&#160;(!selectedGroupCode.value&#160;&amp;&amp;&#160;result.length)&#160;{</text>
<text x="0" y="166" xml:space="preserve">&#160;&#160;&#160;&#160;selectedGroupCode.value&#160;=&#160;result[0].groupCode</text>
<text x="0" y="185" xml:space="preserve">&#160;&#160;}</text>
<text x="0" y="204" xml:space="preserve">}</text>
<text x="0" y="223" xml:space="preserve"></text>
<text x="0" y="242" xml:space="preserve"><tspan>async</tspan>&#160;<tspan>function</tspan>&#160;saveDraft(draft:&#160;ItemDraft)&#160;{</text>
<text x="0" y="261" xml:space="preserve">&#160;&#160;<tspan>await</tspan>&#160;updateAdminOptionItem(selectedGroup.value!.groupCode,&#160;draft.id,&#160;{</text>
<text x="0" y="280" xml:space="preserve">&#160;&#160;&#160;&#160;itemLabel:&#160;draft.itemLabel.trim(),</text>
<text x="0" y="299" xml:space="preserve">&#160;&#160;&#160;&#160;sortOrder:&#160;Number(draft.sortOrder),</text>
<text x="0" y="318" xml:space="preserve">&#160;&#160;&#160;&#160;enabled:&#160;draft.enabled,</text>
<text x="0" y="337" xml:space="preserve">&#160;&#160;})</text>
<text x="0" y="356" xml:space="preserve">}</text>
<text x="0" y="375" xml:space="preserve"></text></g></svg>
