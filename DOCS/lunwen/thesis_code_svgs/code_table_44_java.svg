<text x="0" y="242" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>return</tspan>&#160;<tspan>switch</tspan>&#160;(extension)&#160;{</text>
