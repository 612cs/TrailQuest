<?xml version="1.0"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.0//EN" "http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="677" height="470" viewBox="0 0 677 470">
<rect x="0" y="0" width="677" height="470" fill="white"/>
<g font-family="monospace" font-size="14px">
<text x="0" y="14" xml:space="preserve">@RestController</text>
<text x="0" y="33" xml:space="preserve">@RequestMapping(<tspan>&quot;</tspan><tspan>/api/auth</tspan><tspan>&quot;</tspan>)</text>
<text x="0" y="52" xml:space="preserve">@RequiredArgsConstructor</text>
<text x="0" y="71" xml:space="preserve"><tspan>public</tspan>&#160;<tspan>class</tspan>&#160;<tspan>AuthController</tspan>&#160;{</text>
<text x="0" y="90" xml:space="preserve"></text>
<text x="0" y="109" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>private</tspan>&#160;<tspan>final</tspan>&#160;AuthService&#160;authService;</text>
<text x="0" y="128" xml:space="preserve"></text>
<text x="0" y="147" xml:space="preserve">&#160;&#160;&#160;&#160;@PostMapping(<tspan>&quot;</tspan><tspan>/login</tspan><tspan>&quot;</tspan>)</text>
<text x="0" y="166" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>public</tspan>&#160;ApiResponse&lt;LoginResponse&gt;&#160;login(@Valid&#160;@RequestBody&#160;LoginRequest&#160;request)&#160;{</text>
<text x="0" y="185" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>return</tspan>&#160;ApiResponse.success(<tspan>&quot;</tspan><tspan>登录成功</tspan><tspan>&quot;</tspan>,&#160;authService.login(request));</text>
<text x="0" y="204" xml:space="preserve">&#160;&#160;&#160;&#160;}</text>
<text x="0" y="223" xml:space="preserve"></text>
<text x="0" y="242" xml:space="preserve">&#160;&#160;&#160;&#160;@PostMapping(<tspan>&quot;</tspan><tspan>/register</tspan><tspan>&quot;</tspan>)</text>
<text x="0" y="261" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>public</tspan>&#160;ApiResponse&lt;LoginResponse&gt;&#160;register(@Valid&#160;@RequestBody&#160;RegisterRequest&#160;request)&#160;{</text>
<text x="0" y="280" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>return</tspan>&#160;ApiResponse.success(<tspan>&quot;</tspan><tspan>注册成功</tspan><tspan>&quot;</tspan>,&#160;authService.register(request));</text>
<text x="0" y="299" xml:space="preserve">&#160;&#160;&#160;&#160;}</text>
<text x="0" y="318" xml:space="preserve"></text>
<text x="0" y="337" xml:space="preserve">&#160;&#160;&#160;&#160;@GetMapping(<tspan>&quot;</tspan><tspan>/me</tspan><tspan>&quot;</tspan>)</text>
<text x="0" y="356" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>public</tspan>&#160;ApiResponse&lt;CurrentUserVo&gt;&#160;me(@AuthenticationPrincipal&#160;CustomUserDetails&#160;userDetails)&#160;{</text>
<text x="0" y="375" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>return</tspan>&#160;ApiResponse.success(authService.getCurrentUser(userDetails.getId()));</text>
<text x="0" y="394" xml:space="preserve">&#160;&#160;&#160;&#160;}</text>
<text x="0" y="413" xml:space="preserve">}</text>
<text x="0" y="432" xml:space="preserve"></text></g></svg>
