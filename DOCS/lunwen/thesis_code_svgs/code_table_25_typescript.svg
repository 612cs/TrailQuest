<svg xmlns="http://www.w3.org/2000/svg" width="485" height="428" viewBox="0 0 485 428">
<rect x="0" y="0" width="485" height="428" fill="white"/>
<g font-family="monospace" font-size="14px">
<text x="0" y="14" xml:space="preserve"><tspan>const</tspan>&#160;filterModel&#160;=&#160;ref({</text>
<text x="0" y="33" xml:space="preserve">&#160;&#160;difficulty:&#160;<tspan>&#39;all&#39;</tspan>,</text>
<text x="0" y="52" xml:space="preserve">&#160;&#160;packType:&#160;<tspan>&#39;all&#39;</tspan>,</text>
<text x="0" y="71" xml:space="preserve">&#160;&#160;durationType:&#160;<tspan>&#39;all&#39;</tspan>,</text>
<text x="0" y="90" xml:space="preserve">&#160;&#160;distance:&#160;<tspan>&#39;all&#39;</tspan>,</text>
<text x="0" y="109" xml:space="preserve">})</text>
<text x="0" y="128" xml:space="preserve"></text>
<text x="0" y="147" xml:space="preserve"><tspan>async</tspan>&#160;<tspan>function</tspan>&#160;loadTrails()&#160;{</text>
<text x="0" y="166" xml:space="preserve">&#160;&#160;<tspan>const</tspan>&#160;data&#160;=&#160;<tspan>await</tspan>&#160;fetchTrails({</text>
<text x="0" y="185" xml:space="preserve">&#160;&#160;&#160;&#160;keyword:&#160;currentSearchQuery.value&#160;||&#160;<tspan>undefined</tspan>,</text>
<text x="0" y="204" xml:space="preserve">&#160;&#160;&#160;&#160;difficulty:&#160;withAllAsUndefined(filterModel.value.difficulty),</text>
<text x="0" y="223" xml:space="preserve">&#160;&#160;&#160;&#160;packType:&#160;withAllAsUndefined(filterModel.value.packType),</text>
<text x="0" y="242" xml:space="preserve">&#160;&#160;&#160;&#160;durationType:&#160;withAllAsUndefined(filterModel.value.durationType),</text>
<text x="0" y="261" xml:space="preserve">&#160;&#160;&#160;&#160;distance:&#160;withAllAsUndefined(filterModel.value.distance),</text>
<text x="0" y="280" xml:space="preserve">&#160;&#160;&#160;&#160;sort:&#160;<tspan>&#39;latest&#39;</tspan>,</text>
<text x="0" y="299" xml:space="preserve">&#160;&#160;&#160;&#160;pageNum:&#160;1,</text>
<text x="0" y="318" xml:space="preserve">&#160;&#160;&#160;&#160;pageSize:&#160;30,</text>
<text x="0" y="337" xml:space="preserve">&#160;&#160;})</text>
<text x="0" y="356" xml:space="preserve">&#160;&#160;trails.value&#160;=&#160;data.list</text>
<text x="0" y="375" xml:space="preserve">}</text>
<text x="0" y="394" xml:space="preserve"></text></g></svg>
