<?xml version="1.0"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.0//EN" "http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="505" height="407" viewBox="0 0 505 407">
<rect x="0" y="0" width="505" height="407" fill="white"/>
<g font-family="monospace" font-size="14px">
<text x="0" y="14" xml:space="preserve"><tspan>const</tspan>&#160;feeds&#160;=&#160;reactive&lt;Record&lt;ProfileTab,&#160;ProfileTrailFeedState&gt;&gt;({</text>
<text x="0" y="33" xml:space="preserve">&#160;&#160;posts:&#160;createFeedState(),</text>
<text x="0" y="52" xml:space="preserve">&#160;&#160;saved:&#160;createFeedState(),</text>
<text x="0" y="71" xml:space="preserve">})</text>
<text x="0" y="90" xml:space="preserve"></text>
<text x="0" y="109" xml:space="preserve"><tspan>async</tspan>&#160;<tspan>function</tspan>&#160;loadFeed(tab:&#160;ProfileTab,&#160;reset&#160;=&#160;<tspan>false</tspan>)&#160;{</text>
<text x="0" y="128" xml:space="preserve">&#160;&#160;<tspan>const</tspan>&#160;feed&#160;=&#160;feeds[tab]</text>
<text x="0" y="147" xml:space="preserve">&#160;&#160;<tspan>const</tspan>&#160;targetPage&#160;=&#160;reset&#160;?&#160;1&#160;:&#160;feed.pageNum</text>
<text x="0" y="166" xml:space="preserve"></text>
<text x="0" y="185" xml:space="preserve">&#160;&#160;<tspan>const</tspan>&#160;response&#160;=&#160;tab&#160;===&#160;<tspan>&#39;posts&#39;</tspan></text>
<text x="0" y="204" xml:space="preserve">&#160;&#160;&#160;&#160;?&#160;<tspan>await</tspan>&#160;authApi.fetchMyPublishedTrails(targetPage,&#160;PAGE_SIZE)</text>
<text x="0" y="223" xml:space="preserve">&#160;&#160;&#160;&#160;:&#160;<tspan>await</tspan>&#160;authApi.fetchMyFavoriteTrails(targetPage,&#160;PAGE_SIZE)</text>
<text x="0" y="242" xml:space="preserve"></text>
<text x="0" y="261" xml:space="preserve">&#160;&#160;trailInteractionStore.hydrateTrails(response.list)</text>
<text x="0" y="280" xml:space="preserve">&#160;&#160;feed.items&#160;=&#160;reset&#160;?&#160;response.list&#160;:&#160;[...feed.items,&#160;...response.list]</text>
<text x="0" y="299" xml:space="preserve">&#160;&#160;feed.pageNum&#160;=&#160;response.pageNum&#160;+&#160;1</text>
<text x="0" y="318" xml:space="preserve">&#160;&#160;feed.total&#160;=&#160;response.total</text>
<text x="0" y="337" xml:space="preserve">&#160;&#160;feed.hasMore&#160;=&#160;response.pageNum&#160;&lt;&#160;response.totalPages</text>
<text x="0" y="356" xml:space="preserve">}</text>
<text x="0" y="375" xml:space="preserve"></text></g></svg>
