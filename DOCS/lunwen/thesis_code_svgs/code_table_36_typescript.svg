<g font-family="monospace" font-size="14px">
<text x="0" y="14" xml:space="preserve"><tspan>const</tspan>&#160;{&#160;list,&#160;status,&#160;keyword,&#160;authorKeyword,&#160;load&#160;}&#160;=&#160;useTrailManagementList()</text>
