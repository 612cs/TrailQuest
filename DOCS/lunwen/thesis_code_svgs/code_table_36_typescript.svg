<text x="0" y="128" xml:space="preserve">&#160;&#160;}&#160;<tspan>else</tspan>&#160;{</text>
<text x="0" y="147" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>await</tspan>&#160;offlineTrail(trailId.value)</text>
