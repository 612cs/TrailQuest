<text x="0" y="14" xml:space="preserve"><tspan>public</tspan>&#160;TrailWeatherResponseVo&#160;getTrailWeather(Long&#160;trailId)&#160;{</text>
<text x="0" y="33" xml:space="preserve">&#160;&#160;&#160;&#160;Trail&#160;trail&#160;=&#160;trailMapper.selectActiveById(trailId);</text>
<text x="0" y="52" xml:space="preserve">&#160;&#160;&#160;&#160;ResolvedTrailLocation&#160;resolvedLocation&#160;=&#160;resolveLocation(trail);</text>
<text x="0" y="71" xml:space="preserve"></text>
<text x="0" y="90" xml:space="preserve">&#160;&#160;&#160;&#160;List&lt;TrailWeatherForecastDayVo&gt;&#160;forecast&#160;=</text>
<text x="0" y="109" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;weatherService.getSevenDayForecast(resolvedLocation.lng(),&#160;resolvedLocation.lat());</text>
<text x="0" y="128" xml:space="preserve">&#160;&#160;&#160;&#160;CurrentWeatherSnapshot&#160;currentWeather&#160;=</text>
<text x="0" y="147" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;landscapeMeteorologyService.getCurrentWeather(resolvedLocation.lng(),&#160;resolvedLocation.lat());</text>
<text x="0" y="166" xml:space="preserve">&#160;&#160;&#160;&#160;List&lt;HourlyWeatherPoint&gt;&#160;hourlyForecast&#160;=</text>
<text x="0" y="185" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;landscapeMeteorologyService.getHourlyForecast(resolvedLocation.lng(),&#160;resolvedLocation.lat(),&#160;24);</text>
<text x="0" y="204" xml:space="preserve">&#160;&#160;&#160;&#160;SunAstronomyPoint&#160;sunInfo&#160;=</text>
<text x="0" y="223" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;landscapeAstronomyService.getSunInfo(resolvedLocation.lng(),&#160;resolvedLocation.lat(),&#160;LocalDate.now(),&#160;<tspan>null</tspan>);</text>
<text x="0" y="242" xml:space="preserve">&#160;&#160;&#160;&#160;MoonAstronomyPoint&#160;moonInfo&#160;=</text>
<text x="0" y="261" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;landscapeAstronomyService.getMoonInfo(resolvedLocation.lng(),&#160;resolvedLocation.lat(),&#160;LocalDate.now());</text>
<text x="0" y="280" xml:space="preserve"></text>
<text x="0" y="299" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>return</tspan>&#160;TrailWeatherResponseVo.builder()</text>
<text x="0" y="318" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.locationContext(TrailWeatherLocationContextVo.builder()</text>
<text x="0" y="337" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.lng(resolvedLocation.lng())</text>
<text x="0" y="356" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.lat(resolvedLocation.lat())</text>
<text x="0" y="375" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.resolvedFrom(resolvedLocation.resolvedFrom())</text>
<text x="0" y="394" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.build())</text>
<text x="0" y="413" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.forecast(forecast)</text>
<text x="0" y="432" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.current(toCurrentVo(currentWeather))</text>
<text x="0" y="451" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.hourly(toHourlyVo(hourlyForecast))</text>
<text x="0" y="470" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.astro(toAstroVo(sunInfo,&#160;moonInfo))</text>
<text x="0" y="489" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.build();</text>
<text x="0" y="508" xml:space="preserve">}</text>
<text x="0" y="527" xml:space="preserve"></text>
<text x="0" y="546" xml:space="preserve"><tspan>public</tspan>&#160;LandscapePredictionResponseVo&#160;getTrailPrediction(Long&#160;trailId,&#160;int&#160;days)&#160;{</text>
<text x="0" y="565" xml:space="preserve">&#160;&#160;&#160;&#160;int&#160;normalizedDays&#160;=&#160;Math.min(Math.max(days,&#160;1),&#160;7);</text>
<text x="0" y="584" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>var</tspan>&#160;context&#160;=&#160;landscapeContextService.build(trailId,&#160;normalizedDays);</text>
<text x="0" y="603" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>return</tspan>&#160;LandscapePredictionResponseVo.builder()</text>
<text x="0" y="622" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.sunriseSunset(sunriseSunsetPredictor.predict(context))</text>
<text x="0" y="641" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.milkyWay(milkyWayPredictor.predict(context))</text>
<text x="0" y="660" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.cloudSea(cloudSeaPredictor.predict(context))</text>
<text x="0" y="679" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.rime(rimePredictor.predict(context))</text>
<text x="0" y="698" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.icicle(iciclePredictor.predict(context))</text>
<text x="0" y="717" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.build();</text>
<text x="0" y="736" xml:space="preserve">}</text>
<text x="0" y="755" xml:space="preserve">@app.post(<tspan>&quot;</tspan><tspan>/predict/cloud-sea</tspan><tspan>&quot;</tspan>)</text>
<text x="0" y="774" xml:space="preserve">def&#160;predict_cloud_sea():</text>
<text x="0" y="793" xml:space="preserve">&#160;&#160;&#160;&#160;features&#160;=&#160;request.json[<tspan>&quot;</tspan><tspan>features</tspan><tspan>&quot;</tspan>]</text>
<text x="0" y="812" xml:space="preserve">&#160;&#160;&#160;&#160;model&#160;=&#160;load_random_forest(<tspan>&quot;</tspan><tspan>cloud_sea.pkl</tspan><tspan>&quot;</tspan>)</text>
<text x="0" y="831" xml:space="preserve">&#160;&#160;&#160;&#160;probability&#160;=&#160;model.predict_proba([features])[0][1]</text>
<text x="0" y="850" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>return</tspan>&#160;{</text>
<text x="0" y="869" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>&quot;</tspan><tspan>landscapeType</tspan><tspan>&quot;</tspan>:&#160;<tspan>&quot;</tspan><tspan>cloud_sea</tspan><tspan>&quot;</tspan>,</text>
<text x="0" y="888" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>&quot;</tspan><tspan>probability</tspan><tspan>&quot;</tspan>:&#160;probability,</text>
<text x="0" y="907" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>&quot;</tspan><tspan>bestWindow</tspan><tspan>&quot;</tspan>:&#160;infer_best_window(features),</text>
<text x="0" y="926" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan>&quot;</tspan><tspan>risks</tspan><tspan>&quot;</tspan>:&#160;infer_risk_messages(features),</text>
<text x="0" y="945" xml:space="preserve">&#160;&#160;&#160;&#160;}</text>
<text x="0" y="964" xml:space="preserve"></text></g></svg>
