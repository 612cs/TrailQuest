<text x="0" y="14" xml:space="preserve"><tspan>public</tspan>&#160;SseEmitter&#160;streamChat(Long&#160;userId,&#160;AiChatStreamRequest&#160;request)&#160;{</text>
<text x="0" y="33" xml:space="preserve">&#160;&#160;&#160;&#160;SseEmitter&#160;emitter&#160;=&#160;<tspan>new</tspan>&#160;SseEmitter(0L);</text>
<text x="0" y="52" xml:space="preserve">&#160;&#160;&#160;&#160;aiTaskExecutor.execute(()&#160;-&gt;&#160;handleStream(userId,&#160;request,&#160;emitter));</text>
<text x="0" y="71" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>return</tspan>&#160;emitter;</text>
<text x="0" y="90" xml:space="preserve">}</text>
<text x="0" y="109" xml:space="preserve"></text>
<text x="0" y="128" xml:space="preserve"><tspan>private</tspan>&#160;void&#160;handleStream(Long&#160;userId,&#160;AiChatStreamRequest&#160;request,&#160;SseEmitter&#160;emitter)&#160;{</text>
<text x="0" y="147" xml:space="preserve">&#160;&#160;&#160;&#160;AiConversation&#160;conversation&#160;=&#160;resolveConversation(userId,&#160;request);</text>
<text x="0" y="166" xml:space="preserve">&#160;&#160;&#160;&#160;aiConversationService.appendUserMessage(conversation.getId(),&#160;request.getMessage());</text>
<text x="0" y="185" xml:space="preserve"></text>
<text x="0" y="204" xml:space="preserve">&#160;&#160;&#160;&#160;AiRecommendationResult&#160;recommendation&#160;=</text>
<text x="0" y="223" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;aiRouteRecommendationService.planRecommendation(userId,&#160;request.getMessage());</text>
<text x="0" y="242" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>if</tspan>&#160;(!recommendation.trailCards().isEmpty())&#160;{</text>
<text x="0" y="261" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;sendEvent(emitter,&#160;<tspan>&quot;</tspan><tspan>trail_cards</tspan><tspan>&quot;</tspan>,&#160;recommendation.trailCards());</text>
<text x="0" y="280" xml:space="preserve">&#160;&#160;&#160;&#160;}</text>
<text x="0" y="299" xml:space="preserve"></text>
<text x="0" y="318" xml:space="preserve">&#160;&#160;&#160;&#160;String&#160;metadataJson&#160;=&#160;objectMapper.writeValueAsString(AiMessageMetadata.builder()</text>
<text x="0" y="337" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.trailCards(recommendation.trailCards())</text>
<text x="0" y="356" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.followUps(recommendation.followUps())</text>
<text x="0" y="375" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.build());</text>
<text x="0" y="394" xml:space="preserve"></text>
<text x="0" y="413" xml:space="preserve">&#160;&#160;&#160;&#160;List&lt;DashScopeMessage&gt;&#160;promptMessages&#160;=</text>
<text x="0" y="432" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;buildPromptMessages(conversation.getId(),&#160;request,&#160;recommendation);</text>
<text x="0" y="451" xml:space="preserve">&#160;&#160;&#160;&#160;String&#160;answer&#160;=&#160;dashScopeChatService.streamCompletion(</text>
<text x="0" y="470" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;promptMessages,</text>
<text x="0" y="489" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;resolveChatModel(recommendation.intent()),</text>
<text x="0" y="508" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;delta&#160;-&gt;&#160;sendEventQuietly(emitter,&#160;<tspan>&quot;</tspan><tspan>delta</tspan><tspan>&quot;</tspan>,&#160;Map.of(<tspan>&quot;</tspan><tspan>content</tspan><tspan>&quot;</tspan>,&#160;delta)));</text>
<text x="0" y="527" xml:space="preserve"></text>
<text x="0" y="546" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>if</tspan>&#160;(StringUtils.hasText(answer))&#160;{</text>
<text x="0" y="565" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;aiConversationService.appendAssistantMessage(conversation.getId(),&#160;answer,&#160;metadataJson,&#160;<tspan>null</tspan>);</text>
<text x="0" y="584" xml:space="preserve">&#160;&#160;&#160;&#160;}</text>
<text x="0" y="603" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan>if</tspan>&#160;(!recommendation.followUps().isEmpty())&#160;{</text>
<text x="0" y="622" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;sendEvent(emitter,&#160;<tspan>&quot;</tspan><tspan>follow_ups</tspan><tspan>&quot;</tspan>,&#160;recommendation.followUps());</text>
<text x="0" y="641" xml:space="preserve">&#160;&#160;&#160;&#160;}</text>
<text x="0" y="660" xml:space="preserve">}</text>
<text x="0" y="679" xml:space="preserve">AiParsedQuery&#160;query&#160;=&#160;deepSeekFunctionCalling.parse(message,&#160;userPreference)</text>
<text x="0" y="698" xml:space="preserve">TrailPageRequest&#160;request&#160;=&#160;convertToTrailRequest(query)</text>
<text x="0" y="717" xml:space="preserve">List&#160;candidates&#160;=&#160;trailService.pageTrails(request,&#160;userId).getList()</text>
<text x="0" y="736" xml:space="preserve">List&#160;ranked&#160;=&#160;rankByGeoAndPreference(candidates,&#160;query,&#160;userPreference)</text>
<text x="0" y="755" xml:space="preserve">List&#160;cards&#160;=&#160;buildTrailCards(ranked)</text>
<text x="0" y="774" xml:space="preserve"><tspan>return</tspan>&#160;buildAiRecommendationResult(query,&#160;cards)</text>
