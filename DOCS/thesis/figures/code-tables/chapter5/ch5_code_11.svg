<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1274" viewBox="0 0 860 1274">
<g font-family="Times New Roman" font-size="20pt">
<text x="10" y="34" xml:space="preserve">@PostMapping(&quot;/trails/{id}/approve&quot;)</text>
<text x="10" y="66" xml:space="preserve">public ApiResponse&lt;Void&gt; approveTrail(</text>
<text x="10" y="98" xml:space="preserve">        @PathVariable Long id,</text>
<text x="10" y="130" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails) {</text>
<text x="10" y="162" xml:space="preserve">    adminService.approveTrail(id, userDetails.getId());</text>
<text x="10" y="194" xml:space="preserve">    return ApiResponse.success(&quot;审核通过&quot;, null);</text>
<text x="10" y="226" xml:space="preserve">}</text>
<text x="10" y="258" xml:space="preserve"></text>
<text x="10" y="290" xml:space="preserve">@PostMapping(&quot;/trails/{id}/reject&quot;)</text>
<text x="10" y="322" xml:space="preserve">public ApiResponse&lt;Void&gt; rejectTrail(</text>
<text x="10" y="354" xml:space="preserve">        @PathVariable Long id,</text>
<text x="10" y="386" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="418" xml:space="preserve">        @Valid @RequestBody AdminRejectTrailRequest request) {</text>
<text x="10" y="450" xml:space="preserve">    adminService.rejectTrail(id, userDetails.getId(), request);</text>
<text x="10" y="482" xml:space="preserve">    return ApiResponse.success(&quot;已驳回路线&quot;, null);</text>
<text x="10" y="514" xml:space="preserve">}</text>
<text x="10" y="546" xml:space="preserve"></text>
<text x="10" y="578" xml:space="preserve">// AdminServiceImpl：更新审核状态并委托日志服务记录动作</text>
<text x="10" y="610" xml:space="preserve">public void approveTrail(Long trailId, Long adminId) {</text>
<text x="10" y="642" xml:space="preserve">    Trail trail = requireTrail(trailId);</text>
<text x="10" y="674" xml:space="preserve">    trail.setReviewStatus(ReviewStatus.APPROVED);</text>
<text x="10" y="706" xml:space="preserve">    trail.setReviewedBy(adminId);</text>
<text x="10" y="738" xml:space="preserve">    trail.setReviewedAt(LocalDateTime.now());</text>
<text x="10" y="770" xml:space="preserve">    trailMapper.updateById(trail);</text>
<text x="10" y="802" xml:space="preserve">    adminOperationLogService.recordTrailReview(adminId, trail, &quot;approve&quot;, null);</text>
<text x="10" y="834" xml:space="preserve">}</text>
<text x="10" y="866" xml:space="preserve"></text>
<text x="10" y="898" xml:space="preserve">// AdminOperationLogServiceImpl：形成后台治理审计记录</text>
<text x="10" y="930" xml:space="preserve">public void recordTrailReview(Long operatorId, Trail trail,</text>
<text x="10" y="962" xml:space="preserve">                              String action, String reason) {</text>
<text x="10" y="994" xml:space="preserve">    AdminOperationLog log = new AdminOperationLog();</text>
<text x="10" y="1026" xml:space="preserve">    log.setActionType(action);</text>
<text x="10" y="1058" xml:space="preserve">    log.setTargetType(&quot;trail&quot;);</text>
<text x="10" y="1090" xml:space="preserve">    log.setTargetId(trail.getId());</text>
<text x="10" y="1122" xml:space="preserve">    log.setTargetTitle(trail.getName());</text>
<text x="10" y="1154" xml:space="preserve">    log.setOperatorId(operatorId);</text>
<text x="10" y="1186" xml:space="preserve">    log.setReason(reason);</text>
<text x="10" y="1218" xml:space="preserve">    adminOperationLogMapper.insert(log);</text>
<text x="10" y="1250" xml:space="preserve">}</text>
</g>
</svg>