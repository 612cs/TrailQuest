<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="538" viewBox="0 0 860 538">
<g font-family="Times New Roman" font-size="20pt">
<text x="10" y="34" xml:space="preserve">Input: 用户请求 q，用户画像 u，会话上下文 c</text>
<text x="10" y="66" xml:space="preserve">Output: 推荐路线集合 R，推荐理由 E，追问建议 F</text>
<text x="10" y="98" xml:space="preserve">1. prompt &lt;- buildPrompt(q, u, c)</text>
<text x="10" y="130" xml:space="preserve">2. parsed &lt;- DeepSeek.parse(prompt, function_call_schema)</text>
<text x="10" y="162" xml:space="preserve">3. if parsed.intent != trail_recommendation then return generalAnswer(q)</text>
<text x="10" y="194" xml:space="preserve">4. query &lt;- mapToTrailQuery(parsed.location, parsed.difficulty, parsed.tags)</text>
<text x="10" y="226" xml:space="preserve">5. candidates &lt;- trailService.pageTrails(query, userId)</text>
<text x="10" y="258" xml:space="preserve">6. if candidates is empty then candidates &lt;- fallbackSearch(parsed.location)</text>
<text x="10" y="290" xml:space="preserve">7. for each trail in candidates do</text>
<text x="10" y="322" xml:space="preserve">8.     score &lt;- geoScore + attributeScore + profileScore + popularityScore</text>
<text x="10" y="354" xml:space="preserve">9.     reason &lt;- buildReason(trail, parsed, u)</text>
<text x="10" y="386" xml:space="preserve">10. end for</text>
<text x="10" y="418" xml:space="preserve">11. R &lt;- topK(sortByScore(candidates), 3)</text>
<text x="10" y="450" xml:space="preserve">12. E &lt;- buildRouteFacts(R)</text>
<text x="10" y="482" xml:space="preserve">13. F &lt;- buildFollowUps(parsed, R)</text>
<text x="10" y="514" xml:space="preserve">14. return R, E, F</text>
</g>
</svg>