<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="691" viewBox="0 0 860 691">
<rect x="0" y="0" width="860" height="691" fill="white"/>
<g font-family="Menlo, Monaco, Consolas, Courier New, monospace" font-size="14px">
<text x="10" y="28" xml:space="preserve">// TrailController：路线详情、天气和景观预测接口</text>
<text x="10" y="47" xml:space="preserve">@GetMapping(&quot;/{id}&quot;)</text>
<text x="10" y="66" xml:space="preserve">public ApiResponse&lt;TrailDetailVo&gt; detail(</text>
<text x="10" y="85" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="104" xml:space="preserve">        @PathVariable Long id) {</text>
<text x="10" y="123" xml:space="preserve">    Long userId = userDetails == null ? null : userDetails.getId();</text>
<text x="10" y="142" xml:space="preserve">    return ApiResponse.success(trailService.getTrailDetail(id, userId));</text>
<text x="10" y="161" xml:space="preserve">}</text>
<text x="10" y="180" xml:space="preserve"></text>
<text x="10" y="199" xml:space="preserve">@GetMapping(&quot;/{id}/weather&quot;)</text>
<text x="10" y="218" xml:space="preserve">public ApiResponse&lt;TrailWeatherResponseVo&gt; weather(@PathVariable Long id) {</text>
<text x="10" y="237" xml:space="preserve">    return ApiResponse.success(&quot;未来七天天气加载成功&quot;,</text>
<text x="10" y="256" xml:space="preserve">            trailWeatherService.getTrailWeather(id));</text>
<text x="10" y="275" xml:space="preserve">}</text>
<text x="10" y="294" xml:space="preserve"></text>
<text x="10" y="313" xml:space="preserve">@GetMapping(&quot;/{id}/landscape-prediction&quot;)</text>
<text x="10" y="332" xml:space="preserve">public ApiResponse&lt;LandscapePredictionResponseVo&gt; landscapePrediction(</text>
<text x="10" y="351" xml:space="preserve">        @PathVariable Long id,</text>
<text x="10" y="370" xml:space="preserve">        @RequestParam(defaultValue = &quot;7&quot;) int days) {</text>
<text x="10" y="389" xml:space="preserve">    return ApiResponse.success(&quot;景观预测加载成功&quot;,</text>
<text x="10" y="408" xml:space="preserve">            landscapePredictionService.getTrailPrediction(id, days));</text>
<text x="10" y="427" xml:space="preserve">}</text>
<text x="10" y="446" xml:space="preserve"></text>
<text x="10" y="465" xml:space="preserve">// TrailWeatherServiceImpl：根据路线起点查询天气</text>
<text x="10" y="484" xml:space="preserve">public TrailWeatherResponseVo getTrailWeather(Long trailId) {</text>
<text x="10" y="503" xml:space="preserve">    Trail trail = trailMapper.selectById(trailId);</text>
<text x="10" y="522" xml:space="preserve">    GeoPoint point = resolveTrailPoint(trail);</text>
<text x="10" y="541" xml:space="preserve">    return weatherClient.querySevenDays(point.lng(), point.lat());</text>
<text x="10" y="560" xml:space="preserve">}</text>
<text x="10" y="579" xml:space="preserve"></text>
<text x="10" y="598" xml:space="preserve">// LandscapePredictionServiceImpl：根据路线环境输出景观概率</text>
<text x="10" y="617" xml:space="preserve">public LandscapePredictionResponseVo getTrailPrediction(Long trailId, int days) {</text>
<text x="10" y="636" xml:space="preserve">    LandscapeContext context = landscapeContextService.build(trailId, days);</text>
<text x="10" y="655" xml:space="preserve">    return buildPredictionResponse(context);</text>
<text x="10" y="674" xml:space="preserve">}</text>
</g>
</svg>