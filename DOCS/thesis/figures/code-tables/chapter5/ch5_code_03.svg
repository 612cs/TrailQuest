<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1146" viewBox="0 0 860 1146">
<g font-family="Times New Roman" font-size="20pt">
<text x="10" y="34" xml:space="preserve">// TrailController：路线详情、天气和景观预测接口</text>
<text x="10" y="66" xml:space="preserve">@GetMapping(&quot;/{id}&quot;)</text>
<text x="10" y="98" xml:space="preserve">public ApiResponse&lt;TrailDetailVo&gt; detail(</text>
<text x="10" y="130" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="162" xml:space="preserve">        @PathVariable Long id) {</text>
<text x="10" y="194" xml:space="preserve">    Long userId = userDetails == null ? null : userDetails.getId();</text>
<text x="10" y="226" xml:space="preserve">    return ApiResponse.success(trailService.getTrailDetail(id, userId));</text>
<text x="10" y="258" xml:space="preserve">}</text>
<text x="10" y="290" xml:space="preserve"></text>
<text x="10" y="322" xml:space="preserve">@GetMapping(&quot;/{id}/weather&quot;)</text>
<text x="10" y="354" xml:space="preserve">public ApiResponse&lt;TrailWeatherResponseVo&gt; weather(@PathVariable Long id) {</text>
<text x="10" y="386" xml:space="preserve">    return ApiResponse.success(&quot;未来七天天气加载成功&quot;,</text>
<text x="10" y="418" xml:space="preserve">            trailWeatherService.getTrailWeather(id));</text>
<text x="10" y="450" xml:space="preserve">}</text>
<text x="10" y="482" xml:space="preserve"></text>
<text x="10" y="514" xml:space="preserve">@GetMapping(&quot;/{id}/landscape-prediction&quot;)</text>
<text x="10" y="546" xml:space="preserve">public ApiResponse&lt;LandscapePredictionResponseVo&gt; landscapePrediction(</text>
<text x="10" y="578" xml:space="preserve">        @PathVariable Long id,</text>
<text x="10" y="610" xml:space="preserve">        @RequestParam(defaultValue = &quot;7&quot;) int days) {</text>
<text x="10" y="642" xml:space="preserve">    return ApiResponse.success(&quot;景观预测加载成功&quot;,</text>
<text x="10" y="674" xml:space="preserve">            landscapePredictionService.getTrailPrediction(id, days));</text>
<text x="10" y="706" xml:space="preserve">}</text>
<text x="10" y="738" xml:space="preserve"></text>
<text x="10" y="770" xml:space="preserve">// TrailWeatherServiceImpl：根据路线起点查询天气</text>
<text x="10" y="802" xml:space="preserve">public TrailWeatherResponseVo getTrailWeather(Long trailId) {</text>
<text x="10" y="834" xml:space="preserve">    Trail trail = trailMapper.selectById(trailId);</text>
<text x="10" y="866" xml:space="preserve">    GeoPoint point = resolveTrailPoint(trail);</text>
<text x="10" y="898" xml:space="preserve">    return weatherClient.querySevenDays(point.lng(), point.lat());</text>
<text x="10" y="930" xml:space="preserve">}</text>
<text x="10" y="962" xml:space="preserve"></text>
<text x="10" y="994" xml:space="preserve">// LandscapePredictionServiceImpl：根据路线环境输出景观概率</text>
<text x="10" y="1026" xml:space="preserve">public LandscapePredictionResponseVo getTrailPrediction(Long trailId, int days) {</text>
<text x="10" y="1058" xml:space="preserve">    LandscapeContext context = landscapeContextService.build(trailId, days);</text>
<text x="10" y="1090" xml:space="preserve">    return buildPredictionResponse(context);</text>
<text x="10" y="1122" xml:space="preserve">}</text>
</g>
</svg>