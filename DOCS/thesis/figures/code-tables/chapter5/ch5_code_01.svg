<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1146" viewBox="0 0 860 1146">
<g font-family="Times New Roman" font-size="20pt">
<text x="10" y="34" xml:space="preserve">// AuthController：登录、注册和当前用户接口</text>
<text x="10" y="66" xml:space="preserve">@PostMapping(&quot;/login&quot;)</text>
<text x="10" y="98" xml:space="preserve">public ApiResponse&lt;LoginResponse&gt; login(@Valid @RequestBody LoginRequest request) {</text>
<text x="10" y="130" xml:space="preserve">    return ApiResponse.success(&quot;登录成功&quot;, authService.login(request));</text>
<text x="10" y="162" xml:space="preserve">}</text>
<text x="10" y="194" xml:space="preserve"></text>
<text x="10" y="226" xml:space="preserve">@PostMapping(&quot;/register&quot;)</text>
<text x="10" y="258" xml:space="preserve">public ApiResponse&lt;LoginResponse&gt; register(@Valid @RequestBody RegisterRequest request) {</text>
<text x="10" y="290" xml:space="preserve">    return ApiResponse.success(&quot;注册成功&quot;, authService.register(request));</text>
<text x="10" y="322" xml:space="preserve">}</text>
<text x="10" y="354" xml:space="preserve"></text>
<text x="10" y="386" xml:space="preserve">@GetMapping(&quot;/me&quot;)</text>
<text x="10" y="418" xml:space="preserve">public ApiResponse&lt;CurrentUserVo&gt; me(@AuthenticationPrincipal CustomUserDetails userDetails) {</text>
<text x="10" y="450" xml:space="preserve">    return ApiResponse.success(authService.getCurrentUser(userDetails.getId()));</text>
<text x="10" y="482" xml:space="preserve">}</text>
<text x="10" y="514" xml:space="preserve"></text>
<text x="10" y="546" xml:space="preserve">// AuthServiceImpl：校验账号并签发 JWT</text>
<text x="10" y="578" xml:space="preserve">public LoginResponse login(LoginRequest request) {</text>
<text x="10" y="610" xml:space="preserve">    User user = userMapper.selectByEmail(request.getEmail());</text>
<text x="10" y="642" xml:space="preserve">    validatePassword(request.getPassword(), user.getPasswordHash());</text>
<text x="10" y="674" xml:space="preserve">    String token = jwtTokenProvider.generateToken(user.getId(), user.getRole());</text>
<text x="10" y="706" xml:space="preserve">    return LoginResponse.from(user, token);</text>
<text x="10" y="738" xml:space="preserve">}</text>
<text x="10" y="770" xml:space="preserve"></text>
<text x="10" y="802" xml:space="preserve">// JwtAuthenticationFilter：解析请求头并写入安全上下文</text>
<text x="10" y="834" xml:space="preserve">protected void doFilterInternal(HttpServletRequest request,</text>
<text x="10" y="866" xml:space="preserve">                                HttpServletResponse response,</text>
<text x="10" y="898" xml:space="preserve">                                FilterChain chain) {</text>
<text x="10" y="930" xml:space="preserve">    String token = resolveBearerToken(request);</text>
<text x="10" y="962" xml:space="preserve">    if (jwtTokenProvider.validateToken(token)) {</text>
<text x="10" y="994" xml:space="preserve">        SecurityContextHolder.getContext()</text>
<text x="10" y="1026" xml:space="preserve">                .setAuthentication(buildAuthentication(token));</text>
<text x="10" y="1058" xml:space="preserve">    }</text>
<text x="10" y="1090" xml:space="preserve">    chain.doFilter(request, response);</text>
<text x="10" y="1122" xml:space="preserve">}</text>
</g>
</svg>