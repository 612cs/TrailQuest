<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="691" viewBox="0 0 860 691">
<rect x="0" y="0" width="860" height="691" fill="white"/>
<g font-family="Menlo, Monaco, Consolas, Courier New, monospace" font-size="14px">
<text x="10" y="28" xml:space="preserve">// AuthController：登录、注册和当前用户接口</text>
<text x="10" y="47" xml:space="preserve">@PostMapping(&quot;/login&quot;)</text>
<text x="10" y="66" xml:space="preserve">public ApiResponse&lt;LoginResponse&gt; login(@Valid @RequestBody LoginRequest request) {</text>
<text x="10" y="85" xml:space="preserve">    return ApiResponse.success(&quot;登录成功&quot;, authService.login(request));</text>
<text x="10" y="104" xml:space="preserve">}</text>
<text x="10" y="123" xml:space="preserve"></text>
<text x="10" y="142" xml:space="preserve">@PostMapping(&quot;/register&quot;)</text>
<text x="10" y="161" xml:space="preserve">public ApiResponse&lt;LoginResponse&gt; register(@Valid @RequestBody RegisterRequest request) {</text>
<text x="10" y="180" xml:space="preserve">    return ApiResponse.success(&quot;注册成功&quot;, authService.register(request));</text>
<text x="10" y="199" xml:space="preserve">}</text>
<text x="10" y="218" xml:space="preserve"></text>
<text x="10" y="237" xml:space="preserve">@GetMapping(&quot;/me&quot;)</text>
<text x="10" y="256" xml:space="preserve">public ApiResponse&lt;CurrentUserVo&gt; me(@AuthenticationPrincipal CustomUserDetails userDetails) {</text>
<text x="10" y="275" xml:space="preserve">    return ApiResponse.success(authService.getCurrentUser(userDetails.getId()));</text>
<text x="10" y="294" xml:space="preserve">}</text>
<text x="10" y="313" xml:space="preserve"></text>
<text x="10" y="332" xml:space="preserve">// AuthServiceImpl：校验账号并签发 JWT</text>
<text x="10" y="351" xml:space="preserve">public LoginResponse login(LoginRequest request) {</text>
<text x="10" y="370" xml:space="preserve">    User user = userMapper.selectByEmail(request.getEmail());</text>
<text x="10" y="389" xml:space="preserve">    validatePassword(request.getPassword(), user.getPasswordHash());</text>
<text x="10" y="408" xml:space="preserve">    String token = jwtTokenProvider.generateToken(user.getId(), user.getRole());</text>
<text x="10" y="427" xml:space="preserve">    return LoginResponse.from(user, token);</text>
<text x="10" y="446" xml:space="preserve">}</text>
<text x="10" y="465" xml:space="preserve"></text>
<text x="10" y="484" xml:space="preserve">// JwtAuthenticationFilter：解析请求头并写入安全上下文</text>
<text x="10" y="503" xml:space="preserve">protected void doFilterInternal(HttpServletRequest request,</text>
<text x="10" y="522" xml:space="preserve">                                HttpServletResponse response,</text>
<text x="10" y="541" xml:space="preserve">                                FilterChain chain) {</text>
<text x="10" y="560" xml:space="preserve">    String token = resolveBearerToken(request);</text>
<text x="10" y="579" xml:space="preserve">    if (jwtTokenProvider.validateToken(token)) {</text>
<text x="10" y="598" xml:space="preserve">        SecurityContextHolder.getContext()</text>
<text x="10" y="617" xml:space="preserve">                .setAuthentication(buildAuthentication(token));</text>
<text x="10" y="636" xml:space="preserve">    }</text>
<text x="10" y="655" xml:space="preserve">    chain.doFilter(request, response);</text>
<text x="10" y="674" xml:space="preserve">}</text>
</g>
</svg>