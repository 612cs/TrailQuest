<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="501" viewBox="0 0 860 501">
<rect x="0" y="0" width="860" height="501" fill="white"/>
<g font-family="Menlo, Monaco, Consolas, Courier New, monospace" font-size="14px">
<text x="10" y="28" xml:space="preserve">// ReviewController：评论列表与发布接口</text>
<text x="10" y="47" xml:space="preserve">@GetMapping(&quot;/trails/{trailId}/reviews&quot;)</text>
<text x="10" y="66" xml:space="preserve">public ApiResponse&lt;ReviewPageVo&gt; listByTrailId(</text>
<text x="10" y="85" xml:space="preserve">        @PathVariable Long trailId,</text>
<text x="10" y="104" xml:space="preserve">        @RequestParam(required = false) Long cursor,</text>
<text x="10" y="123" xml:space="preserve">        @RequestParam(required = false) Integer limit) {</text>
<text x="10" y="142" xml:space="preserve">    return ApiResponse.success(reviewService.listByTrailId(trailId, cursor, limit));</text>
<text x="10" y="161" xml:space="preserve">}</text>
<text x="10" y="180" xml:space="preserve"></text>
<text x="10" y="199" xml:space="preserve">@PostMapping(&quot;/reviews&quot;)</text>
<text x="10" y="218" xml:space="preserve">public ApiResponse&lt;CreateReviewResponse&gt; createReview(</text>
<text x="10" y="237" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="256" xml:space="preserve">        @Valid @RequestBody CreateReviewRequest request) {</text>
<text x="10" y="275" xml:space="preserve">    return ApiResponse.success(&quot;评论发布成功&quot;,</text>
<text x="10" y="294" xml:space="preserve">            reviewService.createReview(userDetails.getId(), request));</text>
<text x="10" y="313" xml:space="preserve">}</text>
<text x="10" y="332" xml:space="preserve"></text>
<text x="10" y="351" xml:space="preserve">// ReviewServiceImpl：校验归属关系并保存评论</text>
<text x="10" y="370" xml:space="preserve">public CreateReviewResponse createReview(Long userId, CreateReviewRequest request) {</text>
<text x="10" y="389" xml:space="preserve">    validateTrailAndParent(request.getTrailId(), request.getParentId());</text>
<text x="10" y="408" xml:space="preserve">    Review review = Review.from(userId, request);</text>
<text x="10" y="427" xml:space="preserve">    reviewMapper.insert(review);</text>
<text x="10" y="446" xml:space="preserve">    saveReviewImages(review.getId(), request.getImages());</text>
<text x="10" y="465" xml:space="preserve">    return CreateReviewResponse.from(review);</text>
<text x="10" y="484" xml:space="preserve">}</text>
</g>
</svg>