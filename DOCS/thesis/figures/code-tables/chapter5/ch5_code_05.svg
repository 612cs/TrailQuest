<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="826" viewBox="0 0 860 826">
<g font-family="Times New Roman" font-size="20pt">
<text x="10" y="34" xml:space="preserve">// ReviewController：评论列表与发布接口</text>
<text x="10" y="66" xml:space="preserve">@GetMapping(&quot;/trails/{trailId}/reviews&quot;)</text>
<text x="10" y="98" xml:space="preserve">public ApiResponse&lt;ReviewPageVo&gt; listByTrailId(</text>
<text x="10" y="130" xml:space="preserve">        @PathVariable Long trailId,</text>
<text x="10" y="162" xml:space="preserve">        @RequestParam(required = false) Long cursor,</text>
<text x="10" y="194" xml:space="preserve">        @RequestParam(required = false) Integer limit) {</text>
<text x="10" y="226" xml:space="preserve">    return ApiResponse.success(reviewService.listByTrailId(trailId, cursor, limit));</text>
<text x="10" y="258" xml:space="preserve">}</text>
<text x="10" y="290" xml:space="preserve"></text>
<text x="10" y="322" xml:space="preserve">@PostMapping(&quot;/reviews&quot;)</text>
<text x="10" y="354" xml:space="preserve">public ApiResponse&lt;CreateReviewResponse&gt; createReview(</text>
<text x="10" y="386" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="418" xml:space="preserve">        @Valid @RequestBody CreateReviewRequest request) {</text>
<text x="10" y="450" xml:space="preserve">    return ApiResponse.success(&quot;评论发布成功&quot;,</text>
<text x="10" y="482" xml:space="preserve">            reviewService.createReview(userDetails.getId(), request));</text>
<text x="10" y="514" xml:space="preserve">}</text>
<text x="10" y="546" xml:space="preserve"></text>
<text x="10" y="578" xml:space="preserve">// ReviewServiceImpl：校验归属关系并保存评论</text>
<text x="10" y="610" xml:space="preserve">public CreateReviewResponse createReview(Long userId, CreateReviewRequest request) {</text>
<text x="10" y="642" xml:space="preserve">    validateTrailAndParent(request.getTrailId(), request.getParentId());</text>
<text x="10" y="674" xml:space="preserve">    Review review = Review.from(userId, request);</text>
<text x="10" y="706" xml:space="preserve">    reviewMapper.insert(review);</text>
<text x="10" y="738" xml:space="preserve">    saveReviewImages(review.getId(), request.getImages());</text>
<text x="10" y="770" xml:space="preserve">    return CreateReviewResponse.from(review);</text>
<text x="10" y="802" xml:space="preserve">}</text>
</g>
</svg>