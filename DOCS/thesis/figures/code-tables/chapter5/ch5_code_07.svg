<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1114" viewBox="0 0 860 1114">
<g font-family="Times New Roman" font-size="20pt">
<text x="10" y="34" xml:space="preserve">// AiWebSocketHandler：接收前端对话消息并推送流式结果</text>
<text x="10" y="66" xml:space="preserve">public void handleTextMessage(WebSocketSession session, TextMessage message) {</text>
<text x="10" y="98" xml:space="preserve">    Long userId = resolveUserId(session);</text>
<text x="10" y="130" xml:space="preserve">    aiRouteRecommendationService.streamRecommendation(</text>
<text x="10" y="162" xml:space="preserve">            userId, message.getPayload(),</text>
<text x="10" y="194" xml:space="preserve">            chunk -&gt; session.sendMessage(new TextMessage(chunk)));</text>
<text x="10" y="226" xml:space="preserve">}</text>
<text x="10" y="258" xml:space="preserve"></text>
<text x="10" y="290" xml:space="preserve">// AiRouteRecommendationServiceImpl：规划推荐候选并排序</text>
<text x="10" y="322" xml:space="preserve">public AiRecommendationResult planRecommendation(Long userId, String message) {</text>
<text x="10" y="354" xml:space="preserve">    UserHikingProfile profile = userHikingProfileMapper.selectByUserId(userId);</text>
<text x="10" y="386" xml:space="preserve">    AiParsedQuery parsedQuery = parseQuery(message, buildPreferenceSummary(profile));</text>
<text x="10" y="418" xml:space="preserve">    if (parsedQuery.intent() != AiIntent.TRAIL_RECOMMENDATION) {</text>
<text x="10" y="450" xml:space="preserve">        return AiRecommendationResult.generalQa(parsedQuery);</text>
<text x="10" y="482" xml:space="preserve">    }</text>
<text x="10" y="514" xml:space="preserve">    TrailPageRequest request = buildTrailPageRequest(parsedQuery, message);</text>
<text x="10" y="546" xml:space="preserve">    List&lt;TrailDetailVo&gt; candidates = trailService.pageTrails(request, userId).getList();</text>
<text x="10" y="578" xml:space="preserve">    List&lt;TrailDetailVo&gt; ranked = candidates.stream()</text>
<text x="10" y="610" xml:space="preserve">            .sorted(Comparator.comparingDouble(</text>
<text x="10" y="642" xml:space="preserve">                    trail -&gt; scoreTrail(trail, parsedQuery, profile, message)).reversed())</text>
<text x="10" y="674" xml:space="preserve">            .limit(3)</text>
<text x="10" y="706" xml:space="preserve">            .toList();</text>
<text x="10" y="738" xml:space="preserve">    return buildRecommendationResult(ranked, parsedQuery, profile, message);</text>
<text x="10" y="770" xml:space="preserve">}</text>
<text x="10" y="802" xml:space="preserve"></text>
<text x="10" y="834" xml:space="preserve">private double scoreTrail(TrailDetailVo trail, AiParsedQuery query,</text>
<text x="10" y="866" xml:space="preserve">                          UserHikingProfile profile, String rawMessage) {</text>
<text x="10" y="898" xml:space="preserve">    double score = trail.getRating().doubleValue() * 20;</text>
<text x="10" y="930" xml:space="preserve">    score += matchDifficulty(trail, query) ? 18 : 0;</text>
<text x="10" y="962" xml:space="preserve">    score += matchPackPreference(trail, profile) ? 12 : 0;</text>
<text x="10" y="994" xml:space="preserve">    score += matchLocation(trail, query, rawMessage) ? 20 : 0;</text>
<text x="10" y="1026" xml:space="preserve">    score += Math.log1p(trail.getLikes() + trail.getFavorites());</text>
<text x="10" y="1058" xml:space="preserve">    return score;</text>
<text x="10" y="1090" xml:space="preserve">}</text>
</g>
</svg>