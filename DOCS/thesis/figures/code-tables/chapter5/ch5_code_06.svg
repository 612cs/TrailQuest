<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="762" viewBox="0 0 860 762">
<g font-family="Times New Roman" font-size="20pt">
<text x="10" y="34" xml:space="preserve">// UserController：当前用户发布和收藏路线查询</text>
<text x="10" y="66" xml:space="preserve">@GetMapping(&quot;/me/trails&quot;)</text>
<text x="10" y="98" xml:space="preserve">public ApiResponse&lt;PageResponse&lt;UserTrailListItemVo&gt;&gt; getCurrentUserPublishedTrails(</text>
<text x="10" y="130" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="162" xml:space="preserve">        @Valid PageRequest request) {</text>
<text x="10" y="194" xml:space="preserve">    return ApiResponse.success(</text>
<text x="10" y="226" xml:space="preserve">            userService.getCurrentUserPublishedTrails(userDetails.getId(), request));</text>
<text x="10" y="258" xml:space="preserve">}</text>
<text x="10" y="290" xml:space="preserve"></text>
<text x="10" y="322" xml:space="preserve">@GetMapping(&quot;/me/favorites&quot;)</text>
<text x="10" y="354" xml:space="preserve">public ApiResponse&lt;PageResponse&lt;UserTrailListItemVo&gt;&gt; getCurrentUserFavoriteTrails(</text>
<text x="10" y="386" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="418" xml:space="preserve">        @Valid PageRequest request) {</text>
<text x="10" y="450" xml:space="preserve">    return ApiResponse.success(</text>
<text x="10" y="482" xml:space="preserve">            userService.getCurrentUserFavoriteTrails(userDetails.getId(), request));</text>
<text x="10" y="514" xml:space="preserve">}</text>
<text x="10" y="546" xml:space="preserve"></text>
<text x="10" y="578" xml:space="preserve">// UserServiceImpl：聚合用户资料、发布路线与收藏路线</text>
<text x="10" y="610" xml:space="preserve">public UserProfileVo getCurrentUserProfile(Long userId) {</text>
<text x="10" y="642" xml:space="preserve">    User user = userMapper.selectById(userId);</text>
<text x="10" y="674" xml:space="preserve">    UserHikingProfile profile = hikingProfileMapper.selectByUserId(userId);</text>
<text x="10" y="706" xml:space="preserve">    return UserProfileVo.of(user, profile);</text>
<text x="10" y="738" xml:space="preserve">}</text>
</g>
</svg>