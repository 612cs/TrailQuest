<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="506" viewBox="0 0 860 506">
<g font-family="Times New Roman" font-size="20pt">
<text x="10" y="34" xml:space="preserve">Input: 路线 ID trailId，预测天数 days</text>
<text x="10" y="66" xml:space="preserve">Output: 景观预测结果 P</text>
<text x="10" y="98" xml:space="preserve">1. days &lt;- clamp(days, 1, 7)</text>
<text x="10" y="130" xml:space="preserve">2. trail &lt;- queryTrail(trailId)</text>
<text x="10" y="162" xml:space="preserve">3. location &lt;- resolveStartCoordinate(trail)</text>
<text x="10" y="194" xml:space="preserve">4. track &lt;- queryTrailTrack(trailId)</text>
<text x="10" y="226" xml:space="preserve">5. weather &lt;- fetchCurrentAndHourlyWeather(location)</text>
<text x="10" y="258" xml:space="preserve">6. astronomy &lt;- fetchSunMoonData(location, days)</text>
<text x="10" y="290" xml:space="preserve">7. light &lt;- fetchLightPollution(location)</text>
<text x="10" y="322" xml:space="preserve">8. features &lt;- engineerFeatures(weather, astronomy, light, track)</text>
<text x="10" y="354" xml:space="preserve">9. cloudSea &lt;- randomForestCloudSea.predict(features)</text>
<text x="10" y="386" xml:space="preserve">10. rime &lt;- randomForestRime.predict(features)</text>
<text x="10" y="418" xml:space="preserve">11. icicle &lt;- randomForestIcicle.predict(features)</text>
<text x="10" y="450" xml:space="preserve">12. P &lt;- buildPredictionCards(cloudSea, rime, icicle)</text>
<text x="10" y="482" xml:space="preserve">13. return P</text>
</g>
</svg>