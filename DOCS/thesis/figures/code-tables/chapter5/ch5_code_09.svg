<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="653" viewBox="0 0 860 653">
<rect x="0" y="0" width="860" height="653" fill="white"/>
<g font-family="Menlo, Monaco, Consolas, Courier New, monospace" font-size="14px">
<text x="10" y="28" xml:space="preserve">// LandscapeContextServiceImpl：聚合路线、轨迹、天气和天文数据</text>
<text x="10" y="47" xml:space="preserve">public LandscapeContext build(Long trailId, int days) {</text>
<text x="10" y="66" xml:space="preserve">    Trail trail = trailMapper.selectById(trailId);</text>
<text x="10" y="85" xml:space="preserve">    TrailTrack track = trailTrackMapper.selectByTrailId(trailId);</text>
<text x="10" y="104" xml:space="preserve">    GeoPoint point = resolveStartPoint(trail, track);</text>
<text x="10" y="123" xml:space="preserve">    WeatherBundle weather = weatherClient.query(point, days);</text>
<text x="10" y="142" xml:space="preserve">    AstronomyBundle astronomy = astronomyClient.query(point, days);</text>
<text x="10" y="161" xml:space="preserve">    return new LandscapeContext(trail, track, weather, astronomy);</text>
<text x="10" y="180" xml:space="preserve">}</text>
<text x="10" y="199" xml:space="preserve"></text>
<text x="10" y="218" xml:space="preserve">// LandscapePredictionServiceImpl：调用不同景观预测器</text>
<text x="10" y="237" xml:space="preserve">public LandscapePredictionResponseVo getTrailPrediction(Long trailId, int days) {</text>
<text x="10" y="256" xml:space="preserve">    int normalizedDays = Math.min(Math.max(days, 1), 7);</text>
<text x="10" y="275" xml:space="preserve">    var context = landscapeContextService.build(trailId, normalizedDays);</text>
<text x="10" y="294" xml:space="preserve">    return LandscapePredictionResponseVo.builder()</text>
<text x="10" y="313" xml:space="preserve">            .sunriseSunset(sunriseSunsetPredictor.predict(context))</text>
<text x="10" y="332" xml:space="preserve">            .milkyWay(milkyWayPredictor.predict(context))</text>
<text x="10" y="351" xml:space="preserve">            .cloudSea(cloudSeaPredictor.predict(context))</text>
<text x="10" y="370" xml:space="preserve">            .rime(rimePredictor.predict(context))</text>
<text x="10" y="389" xml:space="preserve">            .icicle(iciclePredictor.predict(context))</text>
<text x="10" y="408" xml:space="preserve">            .source(buildSource(context))</text>
<text x="10" y="427" xml:space="preserve">            .build();</text>
<text x="10" y="446" xml:space="preserve">}</text>
<text x="10" y="465" xml:space="preserve"></text>
<text x="10" y="484" xml:space="preserve">// CloudSeaRandomForestPredictor：构造特征并输出云海概率</text>
<text x="10" y="503" xml:space="preserve">public LandscapePredictionItemVo predict(LandscapeContext context) {</text>
<text x="10" y="522" xml:space="preserve">    double[] features = new double[] {</text>
<text x="10" y="541" xml:space="preserve">            context.humidity(), context.cloudCover(), context.windSpeed(),</text>
<text x="10" y="560" xml:space="preserve">            context.dewPointGap(), context.altitude(), context.precipitation()</text>
<text x="10" y="579" xml:space="preserve">    };</text>
<text x="10" y="598" xml:space="preserve">    double probability = randomForest.predictProbability(features);</text>
<text x="10" y="617" xml:space="preserve">    return buildItem(&quot;cloud_sea&quot;, probability, context);</text>
<text x="10" y="636" xml:space="preserve">}</text>
</g>
</svg>