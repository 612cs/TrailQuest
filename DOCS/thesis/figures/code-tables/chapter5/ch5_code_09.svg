<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1082" viewBox="0 0 860 1082">
<g font-family="Times New Roman" font-size="20pt">
<text x="10" y="34" xml:space="preserve">// LandscapeContextServiceImpl：聚合路线、轨迹、天气和天文数据</text>
<text x="10" y="66" xml:space="preserve">public LandscapeContext build(Long trailId, int days) {</text>
<text x="10" y="98" xml:space="preserve">    Trail trail = trailMapper.selectById(trailId);</text>
<text x="10" y="130" xml:space="preserve">    TrailTrack track = trailTrackMapper.selectByTrailId(trailId);</text>
<text x="10" y="162" xml:space="preserve">    GeoPoint point = resolveStartPoint(trail, track);</text>
<text x="10" y="194" xml:space="preserve">    WeatherBundle weather = weatherClient.query(point, days);</text>
<text x="10" y="226" xml:space="preserve">    AstronomyBundle astronomy = astronomyClient.query(point, days);</text>
<text x="10" y="258" xml:space="preserve">    return new LandscapeContext(trail, track, weather, astronomy);</text>
<text x="10" y="290" xml:space="preserve">}</text>
<text x="10" y="322" xml:space="preserve"></text>
<text x="10" y="354" xml:space="preserve">// LandscapePredictionServiceImpl：调用不同景观预测器</text>
<text x="10" y="386" xml:space="preserve">public LandscapePredictionResponseVo getTrailPrediction(Long trailId, int days) {</text>
<text x="10" y="418" xml:space="preserve">    int normalizedDays = Math.min(Math.max(days, 1), 7);</text>
<text x="10" y="450" xml:space="preserve">    var context = landscapeContextService.build(trailId, normalizedDays);</text>
<text x="10" y="482" xml:space="preserve">    return LandscapePredictionResponseVo.builder()</text>
<text x="10" y="514" xml:space="preserve">            .sunriseSunset(sunriseSunsetPredictor.predict(context))</text>
<text x="10" y="546" xml:space="preserve">            .milkyWay(milkyWayPredictor.predict(context))</text>
<text x="10" y="578" xml:space="preserve">            .cloudSea(cloudSeaPredictor.predict(context))</text>
<text x="10" y="610" xml:space="preserve">            .rime(rimePredictor.predict(context))</text>
<text x="10" y="642" xml:space="preserve">            .icicle(iciclePredictor.predict(context))</text>
<text x="10" y="674" xml:space="preserve">            .source(buildSource(context))</text>
<text x="10" y="706" xml:space="preserve">            .build();</text>
<text x="10" y="738" xml:space="preserve">}</text>
<text x="10" y="770" xml:space="preserve"></text>
<text x="10" y="802" xml:space="preserve">// CloudSeaRandomForestPredictor：构造特征并输出云海概率</text>
<text x="10" y="834" xml:space="preserve">public LandscapePredictionItemVo predict(LandscapeContext context) {</text>
<text x="10" y="866" xml:space="preserve">    double[] features = new double[] {</text>
<text x="10" y="898" xml:space="preserve">            context.humidity(), context.cloudCover(), context.windSpeed(),</text>
<text x="10" y="930" xml:space="preserve">            context.dewPointGap(), context.altitude(), context.precipitation()</text>
<text x="10" y="962" xml:space="preserve">    };</text>
<text x="10" y="994" xml:space="preserve">    double probability = randomForest.predictProbability(features);</text>
<text x="10" y="1026" xml:space="preserve">    return buildItem(&quot;cloud_sea&quot;, probability, context);</text>
<text x="10" y="1058" xml:space="preserve">}</text>
</g>
</svg>