<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="577" viewBox="0 0 860 577">
<rect x="0" y="0" width="860" height="577" fill="white"/>
<g font-family="Menlo, Monaco, Consolas, Courier New, monospace" font-size="14px">
<text x="10" y="28" xml:space="preserve">// TrailController：路线发布入口</text>
<text x="10" y="47" xml:space="preserve">@PostMapping</text>
<text x="10" y="66" xml:space="preserve">public ApiResponse&lt;TrailDetailVo&gt; createTrail(</text>
<text x="10" y="85" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="104" xml:space="preserve">        HttpServletRequest httpServletRequest,</text>
<text x="10" y="123" xml:space="preserve">        @Valid @RequestBody CreateTrailRequest request) {</text>
<text x="10" y="142" xml:space="preserve">    return ApiResponse.success(</text>
<text x="10" y="161" xml:space="preserve">            &quot;路线已提交审核，请耐心等待&quot;,</text>
<text x="10" y="180" xml:space="preserve">            trailService.createTrail(</text>
<text x="10" y="199" xml:space="preserve">                    userDetails.getId(),</text>
<text x="10" y="218" xml:space="preserve">                    resolveRequestIp(httpServletRequest),</text>
<text x="10" y="237" xml:space="preserve">                    request));</text>
<text x="10" y="256" xml:space="preserve">}</text>
<text x="10" y="275" xml:space="preserve"></text>
<text x="10" y="294" xml:space="preserve">// UploadController：媒体与轨迹文件上传</text>
<text x="10" y="313" xml:space="preserve">@PostMapping(&quot;/files&quot;)</text>
<text x="10" y="332" xml:space="preserve">public ApiResponse&lt;MediaFileVo&gt; upload(</text>
<text x="10" y="351" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="370" xml:space="preserve">        @RequestParam MultipartFile file,</text>
<text x="10" y="389" xml:space="preserve">        @RequestParam BizType bizType) {</text>
<text x="10" y="408" xml:space="preserve">    return ApiResponse.success(uploadService.upload(userDetails.getId(), file, bizType));</text>
<text x="10" y="427" xml:space="preserve">}</text>
<text x="10" y="446" xml:space="preserve"></text>
<text x="10" y="465" xml:space="preserve">// TrackParseServiceImpl：解析 GPX/KML 并生成 GeoJSON</text>
<text x="10" y="484" xml:space="preserve">public TrailTrack parse(Long trailId, Long mediaFileId, Long userId) {</text>
<text x="10" y="503" xml:space="preserve">    MediaFile file = mediaFileMapper.selectById(mediaFileId);</text>
<text x="10" y="522" xml:space="preserve">    ParsedTrack parsed = trackParser.parse(file.getObjectKey());</text>
<text x="10" y="541" xml:space="preserve">    return saveTrack(trailId, mediaFileId, userId, parsed);</text>
<text x="10" y="560" xml:space="preserve">}</text>
</g>
</svg>