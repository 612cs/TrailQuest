<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="954" viewBox="0 0 860 954">
<g font-family="Times New Roman" font-size="20pt">
<text x="10" y="34" xml:space="preserve">// TrailController：路线发布入口</text>
<text x="10" y="66" xml:space="preserve">@PostMapping</text>
<text x="10" y="98" xml:space="preserve">public ApiResponse&lt;TrailDetailVo&gt; createTrail(</text>
<text x="10" y="130" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="162" xml:space="preserve">        HttpServletRequest httpServletRequest,</text>
<text x="10" y="194" xml:space="preserve">        @Valid @RequestBody CreateTrailRequest request) {</text>
<text x="10" y="226" xml:space="preserve">    return ApiResponse.success(</text>
<text x="10" y="258" xml:space="preserve">            &quot;路线已提交审核，请耐心等待&quot;,</text>
<text x="10" y="290" xml:space="preserve">            trailService.createTrail(</text>
<text x="10" y="322" xml:space="preserve">                    userDetails.getId(),</text>
<text x="10" y="354" xml:space="preserve">                    resolveRequestIp(httpServletRequest),</text>
<text x="10" y="386" xml:space="preserve">                    request));</text>
<text x="10" y="418" xml:space="preserve">}</text>
<text x="10" y="450" xml:space="preserve"></text>
<text x="10" y="482" xml:space="preserve">// UploadController：媒体与轨迹文件上传</text>
<text x="10" y="514" xml:space="preserve">@PostMapping(&quot;/files&quot;)</text>
<text x="10" y="546" xml:space="preserve">public ApiResponse&lt;MediaFileVo&gt; upload(</text>
<text x="10" y="578" xml:space="preserve">        @AuthenticationPrincipal CustomUserDetails userDetails,</text>
<text x="10" y="610" xml:space="preserve">        @RequestParam MultipartFile file,</text>
<text x="10" y="642" xml:space="preserve">        @RequestParam BizType bizType) {</text>
<text x="10" y="674" xml:space="preserve">    return ApiResponse.success(uploadService.upload(userDetails.getId(), file, bizType));</text>
<text x="10" y="706" xml:space="preserve">}</text>
<text x="10" y="738" xml:space="preserve"></text>
<text x="10" y="770" xml:space="preserve">// TrackParseServiceImpl：解析 GPX/KML 并生成 GeoJSON</text>
<text x="10" y="802" xml:space="preserve">public TrailTrack parse(Long trailId, Long mediaFileId, Long userId) {</text>
<text x="10" y="834" xml:space="preserve">    MediaFile file = mediaFileMapper.selectById(mediaFileId);</text>
<text x="10" y="866" xml:space="preserve">    ParsedTrack parsed = trackParser.parse(file.getObjectKey());</text>
<text x="10" y="898" xml:space="preserve">    return saveTrack(trailId, mediaFileId, userId, parsed);</text>
<text x="10" y="930" xml:space="preserve">}</text>
</g>
</svg>