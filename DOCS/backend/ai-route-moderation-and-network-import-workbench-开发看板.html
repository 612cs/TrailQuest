                        <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                            <div class="text-xs text-gray-500 mb-1">当前状态</div>
                            <div class="font-medium text-sm flex items-center gap-1.5"><span class="w-2 h-2 rounded-full ${wp.status==='Done'?'bg-green-500':'bg-blue-500'}"></span> ${wp.status}</div>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                            <div class="text-xs text-gray-500 mb-1">任务类型</div>
                            <div class="font-medium text-sm">${wp.type}</div>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-lg border border-gray-100 hover:bg-gray-100 cursor-pointer transition-colors" onclick="openModal('story', '${wp.storyId}')">
                            <div class="text-xs text-gray-500 mb-1">所属 Story <i class="ph ph-arrow-up-right text-blue-500"></i></div>
                            <div class="font-medium text-sm text-blue-600">${wp.storyId}</div>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-lg border border-gray-100 hover:bg-gray-100 cursor-pointer transition-colors" onclick="openModal('sprint', '${wp.sprintId}')">
                            <div class="text-xs text-gray-500 mb-1">所属 Sprint <i class="ph ph-arrow-up-right text-blue-500"></i></div>
                            <div class="font-medium text-sm text-blue-600">${wp.sprintId}</div>
                        </div>
                    </div>

                    ${wp.status === 'Blocked' && wp.blocker !== '无' ? `
                        <div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-lg mb-6 flex gap-3 items-start shadow-sm">
                            <i class="ph ph-warning-octagon text-xl mt-0.5"></i>
                            <div>
                                <div class="font-bold text-sm mb-1">任务受阻塞</div>
                                <div class="text-sm">${wp.blocker}</div>
                            </div>
                        </div>
                    ` : ''}

                    <div class="mb-6">
                        <h5 class="font-semibold text-gray-800 mb-2 flex items-center gap-2"><i class="ph ph-check-square-offset text-gray-400"></i> 验收标准 (AC)</h5>
                        <div class="text-gray-700 bg-gray-50 p-4 rounded-lg border border-gray-200 text-sm leading-relaxed">${wp.ac}</div>
                    </div>

                    ${agentInfo ? `
                        <div>
                            <h5 class="font-semibold text-gray-800 mb-2 flex justify-between items-center">
                                <span class="flex items-center gap-2"><i class="ph ph-robot text-gray-400"></i> 子代理执行 Prompt</span>
                                <button onclick="copyPromptFromModal(this)" class="text-xs text-blue-600 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded transition-colors flex items-center gap-1">
                                    <i class="ph ph-copy"></i> 复制指令
                                </button>
                            </h5>
                            <div class="bg-gray-900 text-gray-100 p-4 rounded-lg text-sm prompt-box shadow-inner border border-gray-800">${agentInfo.prompt}</div>
                        </div>
                    ` : ''}
                `;
            } else if (type === 'sprint') {
                 const sprint = MOCK_DATA.sprint.find(s => s.id === id);
                 const wps = MOCK_DATA.workPackages.filter(wp => wp.sprintId === id);
                 titleEl.innerHTML = `<span class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded text-xs border border-orange-200">迭代</span> <span>${sprint.id}</span>`;
                 bodyEl.innerHTML = `
                    <div class="mb-6">
                        <div class="inline-flex items-center gap-1.5 text-gray-600 text-sm mb-3 bg-gray-100 px-2.5 py-1 rounded-full"><i class="ph ph-calendar"></i> 周期: ${sprint.time}</div>
                        <h4 class="font-bold text-lg text-gray-900">迭代目标</h4>
                        <p class="text-gray-700 bg-blue-50/50 p-4 rounded-lg border border-blue-100 mt-2">${sprint.goal}</p>
                    </div>
                    
                    <div class="flex items-center justify-between border-b border-gray-200 pb-2 mb-3">
                        <h5 class="font-semibold text-gray-800">迭代任务清单 (${wps.length})</h5>
                        <button onclick="switchTab('kanban', {key: 'sprintId', val: '${id}'}); closeModal();" class="text-xs text-blue-600 hover:underline">进入完整看板</button>
                    </div>
                    <div class="space-y-2">
                        ${wps.map(wp => `
                            <div class="p-3 border border-gray-200 rounded-lg bg-white hover:border-blue-300 hover:shadow-sm cursor-pointer flex justify-between items-center transition-all group" onclick="openModal('wp', '${wp.id}')">
                                <div class="flex items-center gap-3">
                                    <span class="font-bold text-gray-700">${wp.id}</span>
                                    <span class="text-gray-800 text-sm font-medium">${wp.title}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="px-2 py-1 text-[10px] rounded-full ${wp.status === 'Done' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}">${wp.status}</span>
                                    <i class="ph ph-arrow-right text-gray-300 group-hover:text-blue-500 transition-colors"></i>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                 `;
            }
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('common-modal').classList.add('hidden');
        }

        // 绑定键盘 Esc 键关闭弹窗
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') closeModal();
        });

// --- 交互逻辑 ---

        function switchTab(tabId, filter = null) {
            // 1. 更新导航栏样式
            const navItems = document.querySelectorAll('#sidebar-nav button');
            navItems.forEach(btn => {
                // 恢复默认灰底样式
                btn.className = "w-full flex items-center gap-3 px-3 py-2.5 rounded-md text-gray-700 hover:bg-gray-100 transition-colors";
                // 移除高亮时可能存在的特殊右侧图标
                const iconRight = btn.querySelector('.ph-dots-three-vertical');
                if(iconRight) iconRight.remove();
                
                // 重置左侧图标颜色
                const iconLeft = btn.querySelector('i');
                if(iconLeft) {
                    iconLeft.classList.remove('text-blue-600');
                    iconLeft.classList.add('text-gray-500');
                }
            });

            const activeBtn = document.getElementById(`nav-${tabId}`);
            if (activeBtn) {
                activeBtn.className = "w-full flex items-center justify-between px-3 py-2.5 rounded-md bg-blue-50 text-blue-600 transition-colors";
                
                // 为选中项添加特殊的左/右图标样式
                const activeIconLeft = activeBtn.querySelector('i');
                if(activeIconLeft) {
                    activeIconLeft.classList.remove('text-gray-500');
                    activeIconLeft.classList.add('text-blue-600');
                }
                
                // 重构内部结构以适配左右布局
                const originalText = activeBtn.innerText.trim();
                const iconClass = activeIconLeft ? activeIconLeft.className : 'ph ph-list-dashes text-lg text-blue-600';
                activeBtn.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i class="${iconClass}"></i>
                        ${originalText}
                    </div>
                    <i class="ph ph-dots-three-vertical text-gray-400"></i>
                `;
            }

            // 2. 更新标题和内容
            const titleMap = {
                'overview': '需求开发概览',
                'epic': 'Epic',
                'kanban': '工作包 Kanban',
                'sprint': 'Sprint 计划',
                'stories': '用户故事',
                'questions': '待确认问题',
                'risks': '风险清单',
                'agents': '子代理任务 Prompt'
            };
            document.getElementById('page-title').innerText = titleMap[tabId];

            const container = document.getElementById('content-container');
            container.innerHTML = ''; // Clear

            // 支持传入 filter 参数用于过滤渲染
            switch(tabId) {
                case 'overview': container.innerHTML = renderOverview(); break;
                case 'epic': container.innerHTML = renderEpic(); break;
                case 'kanban': container.innerHTML = renderKanban(filter); break;
                case 'sprint': container.innerHTML = renderSprint(); break;
                case 'stories': container.innerHTML = renderStories(filter); break;
                case 'questions': container.innerHTML = renderQuestions(); break;
                case 'risks': container.innerHTML = renderRisks(); break;
                case 'agents': container.innerHTML = renderAgents(); break;
            }
        }

        function copyPrompt(btn) {
            const text = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i class="ph ph-check text-green-500"></i> <span class="text-green-500">已复制</span>`;
                setTimeout(() => { btn.innerHTML = originalHtml; }, 2000);
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const originalHtml = btn.innerHTML;
                    btn.innerHTML = `<i class="ph ph-check text-green-500"></i> <span class="text-green-500">已复制</span>`;
                    setTimeout(() => { btn.innerHTML = originalHtml; }, 2000);
                } catch (err) {}
                document.body.removeChild(textArea);
            });
        }

        function copyPromptFromModal(btn) {
            const text = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i class="ph ph-check"></i> 复制成功`;
                btn.className = "text-xs text-green-600 bg-green-50 px-2 py-1 rounded flex items-center gap-1 transition-colors";
                setTimeout(() => { 
                    btn.innerHTML = originalHtml; 
                    btn.className = "text-xs text-blue-600 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded transition-colors flex items-center gap-1";
                }, 2000);
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const originalHtml = btn.innerHTML;
                    btn.innerHTML = `<i class="ph ph-check"></i> 复制成功`;
                    btn.className = "text-xs text-green-600 bg-green-50 px-2 py-1 rounded flex items-center gap-1 transition-colors";
                    setTimeout(() => { 
                        btn.innerHTML = originalHtml; 
                        btn.className = "text-xs text-blue-600 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded transition-colors flex items-center gap-1";
                    }, 2000);
                } catch (err) {}
                document.body.removeChild(textArea);
            });
        }

        // 初始化加载 Epic 页
        window.onload = () => {
            if (MOCK_DATA.overview && MOCK_DATA.overview.title) {
                document.title = `需求开发看板 - ${MOCK_DATA.overview.title}`;
                const meta = document.getElementById('sidebar-meta');
                const scaleText = MOCK_DATA.overview.scale ? `规模: ${MOCK_DATA.overview.scale}` : '只读看板';
                const statusText = MOCK_DATA.overview.status ? `状态: ${MOCK_DATA.overview.status}` : '';
                meta.innerText = [scaleText, statusText].filter(Boolean).join(' | ');
            }
            switchTab('overview');
            // 更新同步时间显示
            if(typeof SYNC_TIME !== 'undefined' && SYNC_TIME !== "默认数据") {
                document.getElementById('sync-status').innerText = `已与 Markdown 同步 (${SYNC_TIME})`;
            }
        };
    </script>
</body>
</html>
